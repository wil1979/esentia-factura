<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>ESENTIA PROMO STUDIO V2</title>

  <link rel="stylesheet" href="styles.css"/>

  <!-- EXPORT -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
</head>

<body>

<div class="app">

  <!-- SIDEBAR -->
  <aside class="sidebar">

    <div class="logo-area">
      <h1>ESENTIA</h1>
      <p>PROMO STUDIO V2</p>
    </div>

    <!-- CATALOGO -->
    <div class="field">
      <label>Catálogo</label>

      <select id="catalogSelect">
        <option value="ESENCIAS">Esencias</option>
        <option value="LIMPIEZA">Limpieza</option>
        <option value="VELAS">Velas</option>
      </select>
    </div>

    <!-- PRODUCTO -->
    <div class="field">
      <label>Producto</label>

      <select id="productSelect">
        <option>Cargando...</option>
      </select>
    </div>

    <!-- PLANTILLA -->
    <div class="field">
      <label>Plantilla</label>

      <select id="templateSelect">
        <option value="fresh">Fresh</option>
        <option value="luxury">Luxury</option>
        <option value="candy">Candy</option>
        <option value="nature">Nature</option>
      </select>
    </div>

    <!-- TAMAÑO -->
    <div class="field">
      <label>Tamaño</label>

      <select id="sizeSelect">

        <option value="story">
          Instagram Story 1080x1920
        </option>

        <option value="post">
          Instagram Post 1080x1080
        </option>

        <option value="portrait">
          Vertical 1080x1350
        </option>

      </select>
    </div>

    <!-- MOSTRAR PRECIO -->
    <div class="field check-field">
      <input type="checkbox" id="showPrice" checked />
      <label>Mostrar precio</label>
    </div>

    <!-- IA -->
    <div class="field check-field">
      <input type="checkbox" id="autoStyle" checked />
      <label>Estilo IA automático</label>
    </div>

    <!-- EXPORT -->
    <button id="downloadBtn">
      Descargar PNG
    </button>

  </aside>

  <!-- PREVIEW -->
  <main class="preview-area">

    <div class="promo-card fresh story" id="promoCard">

      <!-- GOTAS -->
      <div class="droplets"></div>

      <!-- OVERLAY -->
      <div class="overlay"></div>

      <!-- IMAGEN -->
      <img
        id="productImage"
        class="product-image"
      />

      <!-- WAVES -->
      <div class="waves">
        <svg viewBox="0 0 500 150" preserveAspectRatio="none">
          <path
            d="M0.00,49.98 C150.00,150.00 349.20,-50.00 500.00,49.98 L500.00,150.00 L0.00,150.00 Z">
          </path>
        </svg>
      </div>

      <!-- CONTENIDO -->
      <div class="content">

        <div class="badge">
          ESENTIA
        </div>

        <h2 id="productName">
          Producto
        </h2>

        <p id="productDescription">
          Descripción automática.
        </p>

        <div class="price" id="productPrice">
          ₡0
        </div>

      </div>

    </div>

  </main>

</div>

<script type="module" src="app.js"></script>

</body>
</html>
