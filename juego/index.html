<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Ruleta de Premios - Sorteo Dinámico con Grupos">
    <meta name="theme-color" content="#0f172a">
    <title>🎰 Ruleta de Premios</title>
    
    <link rel="manifest" href="manifest.json">
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 192 192'><rect fill='%230ea5e9' width='192' height='192'/><text x='50%' y='50%' font-size='120' fill='white' text-anchor='middle' dominant-baseline='middle'>🎰</text></svg>">
    <link rel="apple-touch-icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 192 192'><rect fill='%230ea5e9' width='192' height='192'/><text x='50%' y='50%' font-size='120' fill='white' text-anchor='middle' dominant-baseline='middle'>🎰</text></svg>">
    
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700;900&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --primary: #0ea5e9;
            --accent: #f59e0b;
            --glass: rgba(255, 255, 255, 0.08);
            --glass-border: rgba(255, 255, 255, 0.15);
        }

        * { 
            font-family: 'Outfit', sans-serif;
            box-sizing: border-box;
        }

        body {
            background: linear-gradient(135deg, #0f172a 0%, #1e293b 30%, #0c4a6e 70%, #0f172a 100%);
            min-height: 100vh;
            overflow-x: hidden;
            margin: 0;
            padding: 0;
        }

        .bg-particles {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            pointer-events: none; z-index: 0; overflow: hidden;
        }
        .particle {
            position: absolute; border-radius: 50%;
            background: rgba(14, 165, 233, 0.15);
            animation: floatUp linear infinite;
            will-change: transform, opacity;
        }
        @keyframes floatUp {
            0% { transform: translateY(100vh) scale(0); opacity: 0; }
            10% { opacity: 1; }
            90% { opacity: 1; }
            100% { transform: translateY(-10vh) scale(1); opacity: 0; }
        }

        .glass {
            background: var(--glass);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid var(--glass-border);
            box-shadow: 0 8px 32px rgba(0,0,0,0.3);
        }

        .wheel-container {
            position: relative;
            width: 480px; height: 480px;
            margin: 0 auto;
            contain: layout style paint;
        }
        
        .wheel-svg {
            width: 100%; height: 100%;
            filter: drop-shadow(0 0 30px rgba(14,165,233,0.3));
            transition: transform 0.1s linear;
            will-change: transform;
        }
        
        .wheel-center {
            position: absolute;
            top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            width: 80px; height: 80px;
            border-radius: 50%;
            background: linear-gradient(145deg, #f59e0b, #d97706);
            border: 5px solid rgba(255,255,255,0.3);
            box-shadow: 0 0 40px rgba(245,158,11,0.5), inset 0 0 20px rgba(0,0,0,0.3);
            z-index: 10;
            display: flex; align-items: center; justify-content: center;
        }
        .wheel-center i {
            font-size: 32px; color: white;
            animation: pulse-center 2s ease-in-out infinite;
            will-change: transform;
        }
        @keyframes pulse-center {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.15); }
        }
        .wheel-pointer {
            position: absolute;
            top: -20px; left: 50%;
            transform: translateX(-50%);
            width: 0; height: 0;
            border-left: 22px solid transparent;
            border-right: 22px solid transparent;
            border-top: 42px solid #f59e0b;
            filter: drop-shadow(0 2px 10px rgba(245,158,11,0.8));
            z-index: 20;
        }
        .wheel-pointer::after {
            content: '';
            position: absolute;
            top: -50px; left: 50%;
            transform: translateX(-50%);
            width: 16px; height: 16px;
            background: #f59e0b;
            border-radius: 50%;
            box-shadow: 0 0 20px rgba(245,158,11,0.9);
        }

        .spin-btn {
            background: linear-gradient(135deg, #f59e0b, #d97706);
            border: none;
            color: white;
            font-weight: 900;
            font-size: 1.4rem;
            letter-spacing: 3px;
            text-transform: uppercase;
            padding: 18px 60px;
            border-radius: 50px;
            cursor: pointer;
            position: relative;
            overflow: hidden;
            transition: all 0.3s ease;
            box-shadow: 0 10px 40px rgba(245,158,11,0.4);
            will-change: transform, box-shadow;
        }
        .spin-btn::before {
            content: '';
            position: absolute;
            top: 0; left: -100%;
            width: 100%; height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.3), transparent);
            transition: left 0.5s;
        }
        .spin-btn:hover::before { left: 100%; }
        .spin-btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 15px 50px rgba(245,158,11,0.6);
        }
        .spin-btn:disabled {
            opacity: 0.4; cursor: not-allowed;
            transform: none;
            box-shadow: none;
        }

        .reset-btn {
            background: linear-gradient(135deg, #ef4444, #b91c1c);
            border: none;
            color: white;
            font-weight: 700;
            font-size: 1rem;
            padding: 12px 28px;
            border-radius: 50px;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 6px 25px rgba(239,68,68,0.3);
            will-change: transform, box-shadow;
        }
        .reset-btn:hover:not(:disabled) {
            transform: translateY(-2px);
            box-shadow: 0 10px 35px rgba(239,68,68,0.5);
        }
        .reset-btn:disabled {
            opacity: 0.3; cursor: not-allowed;
            background: #475569;
            box-shadow: none;
        }

        .admin-btn {
            background: linear-gradient(135deg, #6366f1, #4f46e5);
            border: none;
            color: white;
            font-weight: 700;
            font-size: 1rem;
            padding: 12px 28px;
            border-radius: 50px;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 6px 25px rgba(99,102,241,0.3);
        }
        .admin-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 35px rgba(99,102,241,0.5);
        }

        .group-selector {
            background: linear-gradient(135deg, #8b5cf6, #7c3aed);
            border: none;
            color: white;
            font-weight: 600;
            padding: 10px 16px;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 4px 15px rgba(139,92,246,0.3);
        }
        .group-selector:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(139,92,246,0.5);
        }

        .overlay {
            position: fixed; top: 0; left: 0;
            width: 100%; height: 100%;
            background: rgba(0,0,0,0.88);
            backdrop-filter: blur(12px);
            z-index: 100;
            display: none;
            align-items: center; justify-content: center;
            flex-direction: column;
            padding: 20px;
        }
        .overlay.active { display: flex; }
        
        .modal-card {
            background: linear-gradient(145deg, #1e293b, #0f172a);
            border: 2px solid var(--glass-border);
            border-radius: 28px;
            padding: 40px;
            width: 100%;
            max-width: 800px;
            max-height: 90vh;
            overflow-y: auto;
            box-shadow: 0 0 100px rgba(0,0,0,0.5);
            position: relative;
        }

        .winner-card {
            background: linear-gradient(145deg, #1e293b, #0f172a);
            border: 3px solid var(--accent);
            border-radius: 28px;
            padding: 50px 70px;
            text-align: center;
            animation: winnerPop 0.7s cubic-bezier(0.68, -0.55, 0.265, 1.55);
            box-shadow: 0 0 100px rgba(245,158,11,0.4);
            position: relative;
            will-change: transform;
        }
        @keyframes winnerPop {
            0% { transform: scale(0) rotate(-10deg); opacity: 0; }
            100% { transform: scale(1) rotate(0deg); opacity: 1; }
        }
        .winner-avatar {
            width: 120px; height: 120px;
            border-radius: 50%;
            background: linear-gradient(135deg, #f59e0b, #d97706);
            display: flex; align-items: center; justify-content: center;
            margin: 0 auto 24px;
            font-size: 56px;
            font-weight: 900;
            box-shadow: 0 0 50px rgba(245,158,11,0.6);
        }
        .confetti-canvas {
            position: fixed; top: 0; left: 0;
            width: 100%; height: 100%;
            pointer-events: none; z-index: 101;
        }

        .winner-item, .admin-item {
            background: rgba(14, 165, 233, 0.1);
            border: 1px solid rgba(14, 165, 233, 0.2);
            border-radius: 14px;
            padding: 14px 18px;
            margin-bottom: 10px;
            display: flex; align-items: center; gap: 14px;
            animation: slideIn 0.4s ease;
            transition: all 0.3s;
            will-change: transform, background;
        }
        .winner-item:hover, .admin-item:hover {
            background: rgba(14, 165, 233, 0.2);
            transform: translateX(5px);
        }
        @keyframes slideIn {
            from { opacity: 0; transform: translateX(-20px); }
            to { opacity: 1; transform: translateX(0); }
        }
        .winner-rank {
            width: 36px; height: 36px;
            border-radius: 50%;
            background: linear-gradient(135deg, #0ea5e9, #0284c7);
            display: flex; align-items: center; justify-content: center;
            font-weight: 800; font-size: 15px; color: white;
            flex-shrink: 0;
        }
        .winner-rank.gold { background: linear-gradient(135deg, #fbbf24, #f59e0b); }
        .winner-rank.silver { background: linear-gradient(135deg, #94a3b8, #64748b); }
        .winner-rank.bronze { background: linear-gradient(135deg, #b45309, #92400e); }

        .custom-scroll::-webkit-scrollbar { width: 6px; }
        .custom-scroll::-webkit-scrollbar-track { background: rgba(255,255,255,0.05); border-radius: 3px; }
        .custom-scroll::-webkit-scrollbar-thumb { background: rgba(14,165,233,0.4); border-radius: 3px; }

        .glow-text {
            text-shadow: 0 0 20px rgba(14,165,233,0.5), 0 0 40px rgba(14,165,233,0.3);
        }

        .toast {
            position: fixed;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%) translateY(100px);
            background: linear-gradient(135deg, #10b981, #059669);
            color: white;
            padding: 14px 28px;
            border-radius: 50px;
            font-weight: 600;
            box-shadow: 0 10px 40px rgba(16,185,129,0.4);
            z-index: 200;
            opacity: 0;
            transition: all 0.5s cubic-bezier(0.68, -0.55, 0.265, 1.55);
            will-change: transform, opacity;
        }
        .toast.show {
            transform: translateX(-50%) translateY(0);
            opacity: 1;
        }
        .toast.error {
            background: linear-gradient(135deg, #ef4444, #b91c1c);
            box-shadow: 0 10px 40px rgba(239,68,68,0.4);
        }

        .loading-overlay {
            position: fixed; top: 0; left: 0;
            width: 100%; height: 100%;
            background: rgba(15, 23, 42, 0.95);
            z-index: 300;
            display: flex;
            align-items: center; justify-content: center;
            flex-direction: column;
            gap: 20px;
        }
        .loading-overlay.hidden { display: none; }
        .spinner-ring {
            width: 60px; height: 60px;
            border: 4px solid rgba(14,165,233,0.2);
            border-top-color: #0ea5e9;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            will-change: transform;
        }
        @keyframes spin { to { transform: rotate(360deg); } }

        .input-field {
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 12px;
            padding: 12px 16px;
            color: white;
            width: 100%;
            outline: none;
            transition: all 0.3s;
        }
        .input-field:focus {
            border-color: var(--primary);
            background: rgba(255,255,255,0.1);
        }

        @media (max-width: 768px) {
            .wheel-container { width: 320px; height: 320px; }
            .winner-card { padding: 28px 36px; }
            .modal-card { padding: 20px; }
        }
    </style>
</head>
<body class="text-white">

    <!-- Loading Overlay -->
    <div class="loading-overlay" id="loadingOverlay">
        <div class="spinner-ring"></div>
        <p class="text-lg font-semibold text-sky-300">Cargando datos...</p>
    </div>

    <!-- Partículas de fondo -->
    <div class="bg-particles" id="particles"></div>

    <!-- Canvas de confeti -->
    <canvas class="confetti-canvas" id="confettiCanvas"></canvas>

    <!-- Toast notification -->
    <div class="toast" id="toast"></div>

    <!-- Overlay Ganador -->
    <div class="overlay" id="winnerOverlay">
        <div class="winner-card">
            <div class="winner-avatar" id="winnerAvatar">🏆</div>
            <h2 class="text-4xl font-black mb-2 text-amber-400">¡GANADOR!</h2>
            <p class="text-6xl font-black mb-4 glow-text" id="winnerName">Nombre</p>
            <p class="text-slate-400 mb-8 text-lg" id="winnerDate"></p>
            <button onclick="closeWinner()" class="spin-btn">
                <i class="fas fa-check mr-2"></i> Continuar
            </button>
        </div>
    </div>

    <!-- Overlay Administración -->
    <div class="overlay" id="adminOverlay">
        <div class="modal-card custom-scroll">
            <div class="flex items-center justify-between mb-8">
                <h2 class="text-3xl font-black text-sky-400">Administrar Grupos</h2>
                <button onclick="closeAdmin()" class="text-slate-400 hover:text-white transition-colors">
                    <i class="fas fa-times text-2xl"></i>
                </button>
            </div>

            <!-- Formulario Nuevo Grupo -->
            <div class="glass rounded-2xl p-6 mb-8">
                <h3 class="text-xl font-bold mb-4 flex items-center gap-2">
                    <i class="fas fa-plus-circle text-green-400"></i> Crear Nuevo Grupo
                </h3>
                <div class="grid grid-cols-1 md:grid-cols-2 gap-4 mb-4">
                    <input type="text" id="newGroupName" placeholder="Nombre del Grupo (ej: Ventas)" class="input-field">
                    <input type="text" id="newGroupDesc" placeholder="Descripción (opcional)" class="input-field">
                </div>
                <div class="mb-4">
                    <label class="block text-sm text-slate-400 mb-2">Participantes (uno por línea o separados por coma)</label>
                    <textarea id="newGroupParticipants" rows="4" placeholder="LEDA, MIRIAM, EVELYN..." class="input-field"></textarea>
                </div>
                <button onclick="createNewGroup()" class="admin-btn w-full">
                    <i class="fas fa-save mr-2"></i> Guardar Grupo
                </button>
            </div>

            <!-- Lista de Grupos Existentes -->
            <div id="adminGroupsList">
                <p class="text-center text-slate-500 py-8">Cargando grupos...</p>
            </div>
        </div>
    </div>

    <!-- Header -->
    <header class="relative z-10 px-6 py-5">
        <div class="max-w-7xl mx-auto flex items-center justify-between flex-wrap gap-4">
            <div class="flex items-center gap-4">
                <div class="w-14 h-14 rounded-2xl bg-gradient-to-br from-sky-500 to-blue-700 flex items-center justify-center shadow-lg shadow-sky-500/30">
                    <i class="fas fa-dice text-2xl text-white"></i>
                </div>
                <div>
                    <h1 class="text-3xl font-black tracking-tight">Ruleta de Premios</h1>
                    <p class="text-sm text-slate-400">Sorteo Dinámico</p>
                </div>
            </div>
            <div class="flex items-center gap-3 flex-wrap">
                <button onclick="openAdmin()" class="admin-btn">
                    <i class="fas fa-cog mr-2"></i> Administrar
                </button>
                <select id="groupSelector" class="group-selector" onchange="changeGroup()">
                    <option value="">Cargando grupos...</option>
                </select>
                <div class="glass rounded-xl px-5 py-2.5 flex items-center gap-2">
                    <i class="fas fa-users text-sky-400"></i>
                    <span class="text-sm font-semibold"><span id="remainingCount">0</span> participantes</span>
                </div>
                <button id="resetBtn" onclick="resetAll()" class="reset-btn" disabled>
                    <i class="fas fa-rotate-right mr-2"></i> Reiniciar
                </button>
            </div>
        </div>
    </header>

    <!-- Main Content -->
    <main class="relative z-10 max-w-7xl mx-auto px-4 py-6">
        <div class="grid grid-cols-1 lg:grid-cols-12 gap-6">

            <!-- Panel Izquierdo: Ruleta -->
            <div class="lg:col-span-7">
                <div class="glass rounded-2xl p-8 text-center">
                    <div class="mb-6">
                        <p class="text-slate-400 text-sm mb-1">Premio Semanal</p>
                        <h2 class="text-2xl font-bold text-sky-300">Sorteo #<span id="sorteoNum">1</span></h2>
                    </div>

                    <div class="wheel-container mb-10">
                        <div class="wheel-pointer"></div>
                        <svg class="wheel-svg" id="wheelSVG" viewBox="0 0 480 480"></svg>
                        <div class="wheel-center">
                            <i class="fas fa-star"></i>
                        </div>
                    </div>

                    <div class="flex justify-center gap-4 mb-6">
                        <button id="spinBtn" onclick="spinWheel()" class="spin-btn">
                            <i class="fas fa-play mr-2"></i> GIRAR
                        </button>
                    </div>
                </div>
            </div>

            <!-- Panel Derecho: Ganadores -->
            <div class="lg:col-span-5">
                <div class="glass rounded-2xl p-6 h-full">
                    <div class="flex items-center justify-between mb-6">
                        <h3 class="text-xl font-bold flex items-center gap-2">
                            <i class="fas fa-trophy text-amber-400"></i> Ganadores
                        </h3>
                        <span class="text-sm bg-amber-500/20 text-amber-300 px-3 py-1 rounded-full font-semibold" id="winnersCount">0</span>
                    </div>

                    <div class="mb-6 flex items-center gap-4">
                        <div class="relative w-20 h-20 flex-shrink-0">
                            <svg class="w-20 h-20" style="transform: rotate(-90deg);" viewBox="0 0 80 80">
                                <circle cx="40" cy="40" r="34" fill="none" stroke="rgba(255,255,255,0.1)" stroke-width="5"/>
                                <circle id="progressCircle" cx="40" cy="40" r="34" fill="none" stroke="#0ea5e9" stroke-width="5"
                                    stroke-dasharray="213.6" stroke-dashoffset="213.6" stroke-linecap="round" style="transition: stroke-dashoffset 0.5s ease;"/>
                            </svg>
                            <div class="absolute inset-0 flex items-center justify-center text-base font-bold" id="progressPercent">0%</div>
                        </div>
                        <div>
                            <p class="text-sm text-slate-400">Progreso del sorteo</p>
                            <p class="text-xl font-bold"><span id="winnersCount2">0</span> de <span id="totalCount">0</span></p>
                        </div>
                    </div>

                    <div class="custom-scroll overflow-y-auto max-h-[520px] pr-2" id="winnersList">
                        <div class="text-center text-slate-500 py-12">
                            <i class="fas fa-gift text-5xl mb-4 opacity-30"></i>
                            <p class="text-sm">Selecciona un grupo y gira la ruleta para comenzar.</p>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <!-- Firebase SDK -->
    <script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-firestore-compat.js"></script>

    <script>
        // ==================== FIREBASE CONFIG ====================
        const firebaseConfig = {
            apiKey: "AIzaSyDuMNZrLgxBs6CbuPp8j0iyynejt6WCpnQ",
            authDomain: "esentiacreditos-8345f.firebaseapp.com",
            projectId: "esentiacreditos-8345f",
            storageBucket: "esentiacreditos-8345f.firebasestorage.app",
            messagingSenderId: "888658236080",
            appId: "1:888658236080:web:506e5e2085b5a452dba175"
        };

        // ==================== ESTADO ====================
        let participants = [];
        let winners = [];
        let isSpinning = false;
        let db = null;
        let currentRotation = 0;
        let currentGroupId = null;
        let groups = [];

        // ==================== INICIALIZACIÓN ====================
        document.addEventListener('DOMContentLoaded', async () => {
            createParticles();

            try {
                firebase.initializeApp(firebaseConfig);
                db = firebase.firestore();
                console.log('✅ Firebase conectado');

                await loadGroups();
            } catch (e) {
                console.error('Error Firebase:', e);
                showToast('Error conectando Firebase', true);
            }

            document.getElementById('loadingOverlay').classList.add('hidden');
        });

        // ==================== GESTIÓN DE GRUPOS ====================
        async function loadGroups() {
            try {
                const snapshot = await db.collection('participantes_ruleta').get();
                groups = [];
                snapshot.forEach(doc => {
                    groups.push({
                        id: doc.id,
                        ...doc.data()
                    });
                });

                renderGroupSelector();
                renderAdminGroups();
            } catch (e) {
                console.error('Error cargando grupos:', e);
                showToast('Error cargando grupos', true);
            }
        }

        function renderGroupSelector() {
            const selector = document.getElementById('groupSelector');
            const currentVal = selector.value;
            selector.innerHTML = '<option value="">Selecciona un grupo...</option>';
            groups.forEach(g => {
                const option = document.createElement('option');
                option.value = g.id;
                option.textContent = `${g.nombre} (${g.participantes?.length || 0})`;
                selector.appendChild(option);
            });
            if (currentVal && groups.find(g => g.id === currentVal)) {
                selector.value = currentVal;
            } else if (groups.length > 0 && !currentVal) {
                selector.value = groups[0].id;
                changeGroup();
            }
        }

        async function changeGroup() {
            const selector = document.getElementById('groupSelector');
            currentGroupId = selector.value;

            if (!currentGroupId) {
                participants = [];
                winners = [];
                updateUI();
                renderWheel();
                return;
            }

            await loadWinnersFromFirestore();
        }

        // ==================== PANEL ADMIN ====================
        function openAdmin() {
            document.getElementById('adminOverlay').classList.add('active');
            renderAdminGroups();
        }

        function closeAdmin() {
            document.getElementById('adminOverlay').classList.remove('active');
        }

        async function createNewGroup() {
            const name = document.getElementById('newGroupName').value.trim();
            const desc = document.getElementById('newGroupDesc').value.trim();
            const participantsText = document.getElementById('newGroupParticipants').value.trim();

            if (!name) {
                showToast('El nombre del grupo es obligatorio', true);
                return;
            }

            if (!participantsText) {
                showToast('Debes agregar al menos un participante', true);
                return;
            }

            // Procesar participantes
            const participantList = participantsText.split(/[\n,]+/)
                .map(p => p.trim())
                .filter(p => p !== "")
                .map((p, index) => ({
                    id: Date.now().toString() + index,
                    nombre: p.toUpperCase(),
                    departamento: desc || "General"
                }));

            try {
                document.getElementById('loadingOverlay').classList.remove('hidden');
                await db.collection('participantes_ruleta').add({
                    nombre: name,
                    descripcion: desc,
                    participantes: participantList,
                    createdAt: firebase.firestore.FieldValue.serverTimestamp()
                });

                // Limpiar formulario
                document.getElementById('newGroupName').value = '';
                document.getElementById('newGroupDesc').value = '';
                document.getElementById('newGroupParticipants').value = '';

                showToast('✅ Grupo creado exitosamente');
                await loadGroups();
            } catch (e) {
                console.error('Error creando grupo:', e);
                showToast('Error al crear el grupo', true);
            } finally {
                document.getElementById('loadingOverlay').classList.add('hidden');
            }
        }

        async function deleteGroup(id) {
            if (!confirm('¿Estás seguro de eliminar este grupo? Esta acción no se puede deshacer.')) return;

            try {
                document.getElementById('loadingOverlay').classList.remove('hidden');
                await db.collection('participantes_ruleta').doc(id).delete();
                
                // También borrar ganadores asociados si se desea (opcional)
                const snapshot = await db.collection('premios').where('grupoId', '==', id).get();
                const batch = db.batch();
                snapshot.docs.forEach(doc => batch.delete(doc.ref));
                await batch.commit();

                showToast('✅ Grupo eliminado');
                await loadGroups();
                if (currentGroupId === id) {
                    currentGroupId = null;
                    document.getElementById('groupSelector').value = "";
                    changeGroup();
                }
            } catch (e) {
                console.error('Error eliminando grupo:', e);
                showToast('Error al eliminar el grupo', true);
            } finally {
                document.getElementById('loadingOverlay').classList.add('hidden');
            }
        }

        function renderAdminGroups() {
            const list = document.getElementById('adminGroupsList');
            if (groups.length === 0) {
                list.innerHTML = '<p class="text-center text-slate-500 py-8">No hay grupos creados aún.</p>';
                return;
            }

            list.innerHTML = '<h3 class="text-xl font-bold mb-4">Grupos Existentes</h3>' + 
                groups.map(g => `
                <div class="admin-item justify-between">
                    <div class="flex items-center gap-4">
                        <div class="w-10 h-10 rounded-lg bg-sky-500/20 flex items-center justify-center text-sky-400">
                            <i class="fas fa-users"></i>
                        </div>
                        <div>
                            <p class="font-bold text-white">${g.nombre}</p>
                            <p class="text-xs text-slate-400">${g.participantes?.length || 0} participantes • ${g.descripcion || 'Sin descripción'}</p>
                        </div>
                    </div>
                    <button onclick="deleteGroup('${g.id}')" class="text-red-400 hover:text-red-300 p-2">
                        <i class="fas fa-trash-alt"></i>
                    </button>
                </div>
            `).join('');
        }

        // ==================== PARTICULAS ====================
        function createParticles() {
            const container = document.getElementById('particles');
            const particleCount = 30;
            const fragment = document.createDocumentFragment();
            
            for (let i = 0; i < particleCount; i++) {
                const p = document.createElement('div');
                p.className = 'particle';
                p.style.left = Math.random() * 100 + '%';
                const size = Math.random() * 6 + 2;
                p.style.width = size + 'px';
                p.style.height = size + 'px';
                p.style.animationDuration = (Math.random() * 10 + 8) + 's';
                p.style.animationDelay = (Math.random() * 10) + 's';
                fragment.appendChild(p);
            }
            container.appendChild(fragment);
        }

        // ==================== TOAST ====================
        function showToast(message, isError = false) {
            const toast = document.getElementById('toast');
            if (!toast) return;
            toast.textContent = message;
            toast.className = 'toast' + (isError ? ' error' : '');
            toast.classList.add('show');
            setTimeout(() => toast.classList.remove('show'), 3000);
        }

        // ==================== FIRESTORE: CARGAR GANADORES ====================
        async function loadWinnersFromFirestore() {
            if (!db || !currentGroupId) return;

            try {
                const snapshot = await db.collection('premios')
                    .where('grupoId', '==', currentGroupId)
                    .orderBy('posicion', 'asc')
                    .get();

                const firestoreWinners = [];
                snapshot.forEach(doc => {
                    const data = doc.data();
                    firestoreWinners.push({
                        ...data,
                        firestoreId: doc.id
                    });
                });

                const currentGroup = groups.find(g => g.id === currentGroupId);
                if (!currentGroup) return;

                if (firestoreWinners.length > 0) {
                    winners = firestoreWinners.map(w => ({
                        id: w.id || '',
                        nombre: w.nombre,
                        departamento: w.departamento || '',
                        posicion: w.posicion,
                        fecha: w.fecha || '',
                        firestoreId: w.firestoreId
                    }));

                    const winnerNames = new Set(winners.map(w => w.nombre.toUpperCase().trim()));
                    participants = (currentGroup.participantes || []).filter(p => 
                        !winnerNames.has(p.nombre.toUpperCase().trim())
                    ).map(p => ({...p}));

                    showToast(`📋 ${winners.length} ganador(es) cargado(s)`);
                } else {
                    participants = (currentGroup.participantes || []).map(p => ({...p}));
                    winners = [];
                }

                document.getElementById('totalCount').textContent = currentGroup.participantes?.length || 0;
                updateUI();
                renderWheel();
                checkResetButton();

            } catch (e) {
                console.error('Error cargando ganadores:', e);
                showToast('Error cargando datos', true);
                const currentGroup = groups.find(g => g.id === currentGroupId);
                if (currentGroup) {
                    participants = (currentGroup.participantes || []).map(p => ({...p}));
                    document.getElementById('totalCount').textContent = currentGroup.participantes?.length || 0;
                }
                winners = [];
                updateUI();
                renderWheel();
                checkResetButton();
            }
        }

        // ==================== FIRESTORE: GUARDAR GANADOR ====================
        async function saveWinnerToFirestore(winner) {
            if (!db || !currentGroupId) {
                showToast('Grupo no seleccionado', true);
                return false;
            }
            try {
                await db.collection('premios').add({
                    nombre: winner.nombre,
                    departamento: winner.departamento || '',
                    fecha: winner.fecha,
                    posicion: winner.posicion,
                    grupoId: currentGroupId,
                    timestamp: firebase.firestore.FieldValue.serverTimestamp()
                });
                return true;
            } catch (e) {
                console.error('Error guardando:', e);
                showToast('Error guardando ganador', true);
                return false;
            }
        }

        // ==================== FIRESTORE: ARCHIVAR Y LIMPIAR ====================
        async function archiveAndClearFirestore() {
            if (!db || !currentGroupId) return false;

            try {
                const currentGroup = groups.find(g => g.id === currentGroupId);
                const sortedWinners = [...winners].sort((a, b) => a.posicion - b.posicion);
                
                const semanaData = {
                    grupoId: currentGroupId,
                    grupoNombre: currentGroup?.nombre || 'Desconocido',
                    fechaCreacion: firebase.firestore.FieldValue.serverTimestamp(),
                    totalGanadores: winners.length,
                    ganadores: sortedWinners.map(w => ({
                        nombre: w.nombre,
                        departamento: w.departamento,
                        posicion: w.posicion,
                        fecha: w.fecha
                    }))
                };

                await db.collection('premios_historial').add(semanaData);

                const snapshot = await db.collection('premios')
                    .where('grupoId', '==', currentGroupId)
                    .get();
                const batch = db.batch();
                snapshot.docs.forEach(doc => batch.delete(doc.ref));
                await batch.commit();

                return true;
            } catch (e) {
                console.error('Error archivando:', e);
                showToast('Error archivando datos', true);
                return false;
            }
        }

        // ==================== RULETA SVG ====================
        function renderWheel() {
            const svg = document.getElementById('wheelSVG');
            svg.innerHTML = '';

            const count = participants.length;
            if (count === 0) return;

            const cx = 240;
            const cy = 240;
            const radius = 220;
            const angleStep = (2 * Math.PI) / count;

            const colors = [
                '#0ea5e9', '#0284c7', '#0369a1', '#075985',
                '#0c4a6e', '#155e75', '#164e63', '#1e3a5f',
                '#1e40af', '#1d4ed8', '#2563eb', '#3b82f6'
            ];

            const defs = document.createElementNS("http://www.w3.org/2000/svg", "defs");
            const filter = document.createElementNS("http://www.w3.org/2000/svg", "filter");
            filter.setAttribute("id", "textShadow");
            filter.innerHTML = `<feDropShadow dx="0" dy="1" stdDeviation="2" flood-color="black" flood-opacity="0.8"/>`;
            defs.appendChild(filter);
            svg.appendChild(defs);

            participants.forEach((p, i) => {
                const startAngle = i * angleStep - Math.PI / 2;
                const endAngle = startAngle + angleStep;

                const x1 = cx + radius * Math.cos(startAngle);
                const y1 = cy + radius * Math.sin(startAngle);
                const x2 = cx + radius * Math.cos(endAngle);
                const y2 = cy + radius * Math.sin(endAngle);

                const largeArc = angleStep > Math.PI ? 1 : 0;

                const path = document.createElementNS("http://www.w3.org/2000/svg", "path");
                path.setAttribute("d", `M ${cx} ${cy} L ${x1} ${y1} A ${radius} ${radius} 0 ${largeArc} 1 ${x2} ${y2} Z`);
                path.setAttribute("fill", colors[i % colors.length]);
                path.setAttribute("stroke", "rgba(255,255,255,0.15)");
                path.setAttribute("stroke-width", "1");
                svg.appendChild(path);

                const midAngle = startAngle + angleStep / 2;
                const textRadius = radius * 0.65;
                const textX = cx + textRadius * Math.cos(midAngle);
                const textY = cy + textRadius * Math.sin(midAngle);

                const text = document.createElementNS("http://www.w3.org/2000/svg", "text");
                text.setAttribute("x", textX);
                text.setAttribute("y", textY);
                text.setAttribute("text-anchor", "middle");
                text.setAttribute("dominant-baseline", "middle");
                text.setAttribute("fill", "white");
                text.setAttribute("font-size", count > 20 ? "10" : "13");
                text.setAttribute("font-weight", "800");
                text.setAttribute("filter", "url(#textShadow)");

                let rotation = (midAngle * 180 / Math.PI);
                if (rotation > 90 && rotation < 270) rotation += 180;

                text.setAttribute("transform", `rotate(${rotation}, ${textX}, ${textY})`);
                text.textContent = p.nombre;
                svg.appendChild(text);
            });

            const outerCircle = document.createElementNS("http://www.w3.org/2000/svg", "circle");
            outerCircle.setAttribute("cx", cx); outerCircle.setAttribute("cy", cy);
            outerCircle.setAttribute("r", radius);
            outerCircle.setAttribute("fill", "none");
            outerCircle.setAttribute("stroke", "rgba(255,255,255,0.2)");
            outerCircle.setAttribute("stroke-width", "3");
            svg.appendChild(outerCircle);
        }

        function spinWheel() {
            if (isSpinning || participants.length === 0) return;
            if (participants.length === 1) {
                selectWinner(0);
                return;
            }

            isSpinning = true;
            const btn = document.getElementById('spinBtn');
            if (btn) {
                btn.disabled = true;
                btn.innerHTML = '<i class="fas fa-spinner fa-spin mr-2"></i> GIRANDO...';
            }

            const svg = document.getElementById('wheelSVG');
            const winnerIndex = Math.floor(Math.random() * participants.length);
            const count = participants.length;
            const angleStep = 360 / count;

            const segmentCenterAngle = winnerIndex * angleStep + (angleStep / 2);
            const targetRotation = 360 - segmentCenterAngle;

            const spins = 5 + Math.floor(Math.random() * 3);
            const finalRotation = currentRotation + (spins * 360) + targetRotation - (currentRotation % 360);

            const duration = 4500 + Math.random() * 1500;
            const startTime = performance.now();
            const startRotation = currentRotation;
            const totalRotation = finalRotation - startRotation;

            function easeOutCubic(t) { return 1 - Math.pow(1 - t, 3); }

            function animate(currentTime) {
                const elapsed = currentTime - startTime;
                const progress = Math.min(elapsed / duration, 1);
                const eased = easeOutCubic(progress);

                currentRotation = startRotation + (totalRotation * eased);
                svg.style.transform = `rotate(${currentRotation}deg)`;

                if (progress < 1) {
                    requestAnimationFrame(animate);
                } else {
                    setTimeout(() => selectWinner(winnerIndex), 400);
                }
            }
            requestAnimationFrame(animate);
        }

        async function selectWinner(index) {
            const winner = participants[index];
            const now = new Date();
            const fechaStr = now.toLocaleDateString('es-ES', {
                day: '2-digit', month: 'long', year: 'numeric',
                hour: '2-digit', minute: '2-digit'
            });

            const winnerData = {
                ...winner,
                posicion: winners.length + 1,
                fecha: fechaStr,
                timestamp: now.toISOString()
            };

            await saveWinnerToFirestore(winnerData);
            winners.unshift(winnerData);
            participants.splice(index, 1);

            document.getElementById('winnerName').textContent = winner.nombre;
            document.getElementById('winnerDate').textContent = fechaStr;
            document.getElementById('winnerAvatar').textContent = winner.nombre.charAt(0).toUpperCase();
            document.getElementById('winnerOverlay').classList.add('active');

            launchConfetti();
            updateUI();
            renderWheel();
            checkResetButton();

            isSpinning = false;
            const btn = document.getElementById('spinBtn');
            if (btn) {
                btn.disabled = false;
                btn.innerHTML = '<i class="fas fa-play mr-2"></i> GIRAR';
            }
        }

        function closeWinner() {
            document.getElementById('winnerOverlay').classList.remove('active');
            if (participants.length === 0) {
                setTimeout(() => showToast('🎉 ¡Sorteo completado!'), 300);
            }
        }

        function updateUI() {
            document.getElementById('remainingCount').textContent = participants.length;
            document.getElementById('winnersCount').textContent = winners.length;
            document.getElementById('winnersCount2').textContent = winners.length;
            document.getElementById('sorteoNum').textContent = winners.length + 1;

            const totalParticipants = parseInt(document.getElementById('totalCount').textContent) || 1;
            const percent = (winners.length / totalParticipants) * 100;
            const circumference = 2 * Math.PI * 34;
            const offset = circumference - (percent / 100) * circumference;
            const progressCircle = document.getElementById('progressCircle');
            if (progressCircle) progressCircle.style.strokeDashoffset = offset;
            const progressPercent = document.getElementById('progressPercent');
            if (progressPercent) progressPercent.textContent = Math.round(percent) + '%';

            const list = document.getElementById('winnersList');
            if (winners.length === 0) {
                list.innerHTML = `<div class="text-center text-slate-500 py-12"><i class="fas fa-gift text-5xl mb-4 opacity-30"></i><p class="text-sm">Gira la ruleta para comenzar.</p></div>`;
                return;
            }

            const sortedWinners = [...winners].sort((a, b) => a.posicion - b.posicion);
            list.innerHTML = sortedWinners.map((w) => {
                let rankClass = w.posicion === 1 ? 'gold' : w.posicion === 2 ? 'silver' : w.posicion === 3 ? 'bronze' : '';
                return `
                    <div class="winner-item">
                        <div class="winner-rank ${rankClass}">${w.posicion}</div>
                        <div class="flex-1 min-w-0">
                            <p class="font-bold text-white truncate text-base">${w.nombre}</p>
                            <p class="text-xs text-slate-400">${w.departamento || ''} • ${w.fecha}</p>
                        </div>
                        <i class="fas fa-crown text-amber-400 ${w.posicion === 1 ? '' : 'opacity-0'}"></i>
                    </div>
                `;
            }).join('');
        }

        function checkResetButton() {
            const resetBtn = document.getElementById('resetBtn');
            if (!resetBtn) return;
            const totalParticipants = parseInt(document.getElementById('totalCount').textContent) || 0;
            if (participants.length === 0 && winners.length === totalParticipants && totalParticipants > 0) {
                resetBtn.disabled = false;
                resetBtn.innerHTML = '<i class="fas fa-rotate-right mr-2"></i> Reiniciar Sorteo';
            } else {
                resetBtn.disabled = true;
                resetBtn.innerHTML = '<i class="fas fa-lock mr-2"></i> Completar para reiniciar';
            }
        }

        async function resetAll() {
            if (participants.length > 0) {
                showToast('Debes completar el sorteo antes de reiniciar', true);
                return;
            }
            if (!confirm('¿Archivar sorteo actual y comenzar uno nuevo?')) return;

            document.getElementById('loadingOverlay').classList.remove('hidden');
            const archived = await archiveAndClearFirestore();
            if (archived) {
                await loadWinnersFromFirestore();
                showToast('✅ Sorteo archivado y reiniciado');
            }
            document.getElementById('loadingOverlay').classList.add('hidden');
        }

        function launchConfetti() {
            const canvas = document.getElementById('confettiCanvas');
            const ctx = canvas.getContext('2d');
            canvas.width = window.innerWidth; canvas.height = window.innerHeight;
            const particles = [];
            const colors = ['#f59e0b', '#0ea5e9', '#10b981', '#ef4444', '#8b5cf6', '#ec4899', '#fbbf24'];
            for (let i = 0; i < 200; i++) {
                particles.push({
                    x: canvas.width / 2, y: canvas.height / 2,
                    vx: (Math.random() - 0.5) * 25, vy: (Math.random() - 0.5) * 25 - 8,
                    color: colors[Math.floor(Math.random() * colors.length)],
                    size: Math.random() * 10 + 4, rotation: Math.random() * 360,
                    rotationSpeed: (Math.random() - 0.5) * 12, life: 1, decay: 0.004 + Math.random() * 0.008
                });
            }
            function animateConfetti() {
                ctx.clearRect(0, 0, canvas.width, canvas.height);
                let alive = false;
                particles.forEach(p => {
                    if (p.life <= 0) return;
                    alive = true;
                    p.x += p.vx; p.y += p.vy; p.vy += 0.25; p.rotation += p.rotationSpeed; p.life -= p.decay;
                    ctx.save(); ctx.translate(p.x, p.y); ctx.rotate(p.rotation * Math.PI / 180);
                    ctx.globalAlpha = p.life; ctx.fillStyle = p.color;
                    ctx.fillRect(-p.size/2, -p.size/2, p.size, p.size); ctx.restore();
                });
                if (alive) requestAnimationFrame(animateConfetti);
            }
            animateConfetti();
        }

        window.addEventListener('resize', () => {
            const canvas = document.getElementById('confettiCanvas');
            if (canvas) { canvas.width = window.innerWidth; canvas.height = window.innerHeight; }
        });

        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('sw.js').catch(() => console.log('SW no disponible'));
        }
    </script>
</body>
