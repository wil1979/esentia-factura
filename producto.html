<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Esentia • Producto</title>
    
    <!-- Fuentes -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    
    <!-- Estilos externos -->
    <link rel="stylesheet" href="producto.css">
    
    <!-- Metadatos OG dinámicos para Facebook -->
    <script src="og-meta.js" defer></script>
    <script src="carrito-utils.js"></script>
    <script src="producto.js"></script>
</head>
<body>

    <!-- Header Esentia -->
    <header class="header-esentia">
        <h1>Esentia</h1>
    </header>

    <!-- Contenedor Principal -->
    <div class="contenedor">
        <div class="card" id="contenedorProducto">
            <div class="skeleton-loader">
                <div class="skeleton skeleton-image"></div>
                <div class="skeleton skeleton-text" style="width:80%"></div>
                <div class="skeleton skeleton-text" style="width:60%"></div>
                <div class="skeleton skeleton-text" style="width:90%"></div>
            </div>
        </div>
    </div>

    <!-- Botón Flotante Volver -->
    <button class="btn-volver" onclick="window.location.href='catalogo.html'" title="Volver al catálogo">⟵</button>

    <!-- Lightbox para imagen -->
    <div id="lightbox" class="lightbox-overlay" onclick="cerrarLightbox(event)">
        <span class="lightbox-close">×</span>
        <img id="lightbox-img" class="lightbox-img" src="" alt="Vista ampliada">
    </div>

    <!-- Firebase y Lógica Principal -->
    <script type="module" src="firebase-init.js"></script>
    <script src="producto.js"></script>

</body>
</html>
