<!-- ver-factura.html - Visualización Online de Facturas -->
<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Factura - Esentia</title>
  <style>
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      max-width: 600px;
      margin: 0 auto;
      padding: 20px;
      background: #f5f5f5;
      color: #333;
    }
    .factura-container {
      background: white;
      padding: 20px;
      border-radius: 12px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.1);
    }
    .header { text-align: center; border-bottom: 2px solid #667eea; padding-bottom: 15px; margin-bottom: 20px; }
    .header h1 { color: #667eea; margin: 0; }
    .info { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 20px; font-size: 14px; }
    .producto { display: flex; justify-content: space-between; padding: 8px 0; border-bottom: 1px solid #eee; }
    .total { font-size: 18px; font-weight: bold; text-align: right; margin-top: 15px; color: #667eea; }
    .loading { text-align: center; padding: 40px; }
    .error { color: #e74c3c; text-align: center; padding: 20px; }
    .btn-print {
      display: block;
      width: 100%;
      padding: 12px;
      background: #667eea;
      color: white;
      border: none;
      border-radius: 8px;
      font-size: 16px;
      cursor: pointer;
      margin-top: 20px;
    }
    .btn-print:hover { background: #5568d3; }
    @media print { .btn-print { display: none; } }
  </style>
</head>
<body>
  <div class="factura-container">
    <div id="contenido">
      <div class="loading">🔄 Cargando factura...</div>
    </div>
  </div>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
    import { getFirestore, doc, getDoc } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

    // ✅ TU CONFIGURACIÓN DE FIREBASE
    const firebaseConfig = {
      apiKey: "TU_API_KEY",
      authDomain: "TU_PROYECTO.firebaseapp.com",
      projectId: "TU_PROYECTO",
      storageBucket: "TU_PROYECTO.appspot.com",
      messagingSenderId: "TU_SENDER_ID",
      appId: "TU_APP_ID"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);

    // Obtener ID de URL
    const params = new URLSearchParams(window.location.search);
    const facturaId = params.get('id');

    if (!facturaId) {
      document.getElementById('contenido').innerHTML = '<div class="error">❌ No se especificó una factura</div>';
    } else {
      cargarFactura(facturaId);
    }

    async function cargarFactura(id) {
      try {
        const docRef = doc(db, "facturas_rapidas", id);
        const snap = await getDoc(docRef);
        
        if (!snap.exists()) {
          document.getElementById('contenido').innerHTML = '<div class="error">❌ Factura no encontrada</div>';
          return;
        }

        const f = snap.data();
        
        document.getElementById('contenido').innerHTML = `
          <div class="header">
            <h1>🌸 ESENTIA</h1>
            <p>Factura #${id.slice(-6).toUpperCase()}</p>
            <p>${new Date(f.fecha).toLocaleString()}</p>
          </div>
          
          <div class="info">
            <div><strong>Cliente:</strong><br>${f.clienteNombre}</div>
            <div><strong>Cédula:</strong><br>${f.clienteId}</div>
            <div><strong>Método:</strong><br>${f.metodoPago || 'Contado'}</div>
            <div><strong>Estado:</strong><br>${f.estado === 'completado' ? '✅ Pagado' : '⏳ Pendiente'}</div>
          </div>
          
          <h3>Productos</h3>
          <div>
            ${(f.productos || []).map(p => `
              <div class="producto">
                <div>
                  <strong>${p.nombre}</strong><br>
                  <small>${p.variante} x${p.cantidad}</small>
                </div>
                <strong>₡${p.subtotal.toLocaleString()}</strong>
              </div>
            `).join('')}
          </div>
          
          <div class="total">
            ${f.descuento > 0 ? `<div style="font-size: 14px; color: #e74c3c;">Descuento: -₡${f.descuento.toLocaleString()}</div>` : ''}
            TOTAL: ₡${(f.total || 0).toLocaleString()}
          </div>
          
          <button class="btn-print" onclick="window.print()">🖨️ Imprimir / Guardar PDF</button>
        `;
      } catch (e) {
        console.error(e);
        document.getElementById('contenido').innerHTML = '<div class="error">❌ Error al cargar la factura</div>';
      }
    }
  </script>
</body>
</html>
