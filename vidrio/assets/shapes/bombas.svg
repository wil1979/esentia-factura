<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 450" width="100%" height="100%">
  <defs>
    <filter id="water-drop" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="3" result="blur" />
      <feOffset in="blur" dx="2" dy="3" result="offsetblur" />
      <feFlood flood-color="#000" flood-opacity="0.4" result="shadowColor" />
      <feComposite in2="offsetblur" operator="in" result="shadow" />
      
      <feSpecularLighting in="blur" surfaceScale="5" specularConstant="1" specularExponent="15" lighting-color="#fff" result="light">
        <fePointLight x="-50" y="-100" z="150" />
      </feSpecularLighting>
      <feComposite in2="SourceAlpha" operator="in" result="highlight" />
      
      <feMerge>
        <feMergeNode in="shadow" />
        <feMergeNode in="SourceGraphic" />
        <feMergeNode in="highlight" />
      </feMerge>
    </filter>

    <radialGradient id="drop-grad" cx="35%" cy="35%" r="65%">
      <stop offset="0%" stop-color="#fff" stop-opacity="0.5" />
      <stop offset="70%" stop-color="#fff" stop-opacity="0.1" />
      <stop offset="100%" stop-color="#000" stop-opacity="0.2" />
    </radialGradient>
  </defs>

  <g filter="url(#water-drop)" opacity="0.85" style="mix-blend-mode: overlay;">
    <circle cx="350" cy="180" r="28" fill="url(#drop-grad)" />
    <circle cx="680" cy="350" r="26" fill="url(#drop-grad)" />
    <circle cx="120" cy="330" r="25" fill="url(#drop-grad)" />
    <circle cx="480" cy="110" r="22" fill="url(#drop-grad)" />

    <path d="M 270,170 Q 285,150 290,175 Q 295,200 275,195 Q 255,190 270,170 Z" fill="url(#drop-grad)" />
    <path d="M 520,280 Q 540,270 535,295 Q 530,320 510,305 Q 500,290 520,280 Z" fill="url(#drop-grad)" />
    <path d="M 620,100 Q 635,85 640,105 Q 645,125 625,120 Z" fill="url(#drop-grad)" />

    <circle cx="310" cy="220" r="12" fill="url(#drop-grad)" />
    <circle cx="390" cy="140" r="10" fill="url(#drop-grad)" />
    <circle cx="420" cy="230" r="15" fill="url(#drop-grad)" />
    <circle cx="450" cy="270" r="8" fill="url(#drop-grad)" />
    <circle cx="360" cy="270" r="14" fill="url(#drop-grad)" />
    <circle cx="630" cy="310" r="12" fill="url(#drop-grad)" />
    <circle cx="720" cy="390" r="9" fill="url(#drop-grad)" />
    <circle cx="160" cy="280" r="11" fill="url(#drop-grad)" />
    <circle cx="90" cy="370" r="13" fill="url(#drop-grad)" />
    
    <circle cx="220" cy="80" r="6" fill="url(#drop-grad)" />
    <circle cx="240" cy="95" r="4" fill="url(#drop-grad)" />
    <circle cx="580" cy="180" r="7" fill="url(#drop-grad)" />
    <circle cx="600" cy="200" r="5" fill="url(#drop-grad)" />
    <circle cx="470" cy="360" r="6" fill="url(#drop-grad)" />
    <circle cx="300" cy="340" r="5" fill="url(#drop-grad)" />
  </g>
</svg>
