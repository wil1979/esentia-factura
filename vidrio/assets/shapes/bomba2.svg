<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 450" width="100%" height="100%">
  <defs>
    <filter id="condensation-drop" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="2" result="blur" />
      <feOffset in="blur" dx="1.5" dy="2" result="offset" />
      <feFlood flood-color="#000" flood-opacity="0.35" result="shadowColor" />
      <feComposite in2="offset" operator="in" result="shadow" />
      <feSpecularLighting in="blur" surfaceScale="4" specularConstant="1.2" specularExponent="20" lighting-color="#fff" result="light">
        <fePointLight x="-30" y="-60" z="100" />
      </feSpecularLighting>
      <feComposite in2="SourceAlpha" operator="in" result="highlight" />
      <feMerge>
        <feMergeNode in="shadow" />
        <feMergeNode in="SourceGraphic" />
        <feMergeNode in="highlight" />
      </feMerge>
    </filter>

    <radialGradient id="cond-grad" cx="30%" cy="30%" r="70%">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.6" />
      <stop offset="80%" stop-color="#ffffff" stop-opacity="0.1" />
      <stop offset="100%" stop-color="#000000" stop-opacity="0.25" />
    </radialGradient>
  </defs>

  <g filter="url(#condensation-drop)" opacity="0.9" style="mix-blend-mode: overlay;">
    <circle cx="150" cy="80" r="16" fill="url(#cond-grad)" />
    <circle cx="175" cy="95" r="10" fill="url(#cond-grad)" />
    <circle cx="140" cy="115" r="8" fill="url(#cond-grad)" />
    
    <circle cx="550" cy="150" r="18" fill="url(#cond-grad)" />
    <circle cx="530" cy="180" r="12" fill="url(#cond-grad)" />
    <circle cx="575" cy="130" r="9" fill="url(#cond-grad)" />

    <circle cx="250" cy="280" r="22" fill="url(#cond-grad)" />
    <circle cx="220" cy="260" r="14" fill="url(#cond-grad)" />
    <circle cx="280" cy="300" r="11" fill="url(#cond-grad)" />

    <circle cx="80" cy="200" r="7" fill="url(#cond-grad)" />
    <circle cx="100" cy="220" r="5" fill="url(#cond-grad)" />
    <circle cx="380" cy="80" r="12" fill="url(#cond-grad)" />
    <circle cx="410" cy="95" r="7" fill="url(#cond-grad)" />
    <circle cx="700" cy="180" r="15" fill="url(#cond-grad)" />
    <circle cx="730" cy="210" r="10" fill="url(#cond-grad)" />
    <circle cx="450" cy="380" r="16" fill="url(#cond-grad)" />
    <circle cx="480" cy="360" r="8" fill="url(#cond-grad)" />
    <circle cx="620" cy="320" r="13" fill="url(#cond-grad)" />
    <circle cx="320" cy="190" r="9" fill="url(#cond-grad)" />
  </g>
</svg>
