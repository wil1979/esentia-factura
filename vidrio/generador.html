<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--primary:#e94560;--secondary:#0f3460;--dark:#1a1a2e;--light:#a2d5f2;--success:#27ae60;--warning:#f39c12}
body{font-family:'Poppins',sans-serif;background:var(--dark);color:#eee;display:flex;height:100vh;overflow:hidden}
.controls{width:420px;background:#16213e;padding:15px;overflow-y:auto;border-right:2px solid var(--secondary);scrollbar-width:thin;scrollbar-color:var(--primary) var(--secondary)}
.controls::-webkit-scrollbar{width:8px}
.controls::-webkit-scrollbar-track{background:var(--secondary)}
.controls::-webkit-scrollbar-thumb{background:var(--primary);border-radius:4px}
.controls h1{font-size:1.2rem;margin-bottom:5px;color:var(--primary);text-align:center;font-family:'Righteous',cursive;text-shadow:0 0 20px rgba(233,69,96,0.5)}
.version-badge{text-align:center;font-size:0.7rem;color:var(--light);margin-bottom:15px;opacity:0.7}
.section{margin-bottom:15px;padding:12px;background:var(--secondary);border-radius:12px;border:1px solid rgba(255,255,255,0.05)}
.section h3{font-size:0.85rem;margin-bottom:10px;color:var(--light);border-bottom:2px solid var(--primary);padding-bottom:6px;display:flex;align-items:center;gap:8px}
.section h3::before{content:'';width:3px;height:16px;background:var(--primary);border-radius:2px}
label{display:block;margin:6px 0 3px;font-size:0.78rem;color:#bbb;font-weight:500}
input[type="color"],input[type="number"],input[type="text"],select,textarea{width:100%;padding:8px 10px;border-radius:8px;border:1px solid rgba(255,255,255,0.1);background:var(--dark);color:#fff;font-size:0.82rem;transition:all 0.3s}
input[type="color"]{height:38px;cursor:pointer;padding:4px}
input:focus,select:focus,textarea:focus{outline:none;border-color:var(--primary);box-shadow:0 0 8px rgba(233,69,96,0.2)}
input[type="range"]{width:100%;margin:4px 0;accent-color:var(--primary);height:6px;-webkit-appearance:none;background:#2a2a5e;border-radius:3px;outline:none}
input[type="range"]::-webkit-slider-thumb{-webkit-appearance:none;width:16px;height:16px;border-radius:50%;background:var(--primary);cursor:pointer}
input[type="file"]{width:100%;margin:5px 0;color:#ccc;font-size:0.75rem;padding:8px;background:#0f0f23;border-radius:8px;border:2px dashed #2a2a5e;cursor:pointer}
input[type="file"]:hover{border-color:var(--primary)}
.btn{width:100%;padding:10px;margin:4px 0;border:none;border-radius:10px;cursor:pointer;font-weight:700;font-family:'Poppins',sans-serif;transition:all 0.3s;font-size:0.85rem}
.btn-primary{background:var(--primary);color:white;box-shadow:0 4px 15px rgba(233,69,96,0.4)}
.btn-primary:hover{background:#c13651;transform:translateY(-2px)}
.btn-secondary{background:transparent;color:var(--light);border:2px solid var(--light)}
.btn-secondary:hover{background:var(--light);color:var(--dark)}
.btn-accent{background:var(--success);color:white}
.btn-accent:hover{background:#219a52}
.btn-warning{background:var(--warning);color:var(--dark)}
.btn-warning:hover{background:#e67e22}
.image-card{background:var(--dark);border-radius:10px;padding:12px;margin:8px 0;border:1px solid rgba(255,255,255,0.1);transition:all 0.3s}
.image-card:hover{border-color:var(--primary);box-shadow:0 4px 15px rgba(233,69,96,0.2)}
.image-card-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:10px;padding-bottom:8px;border-bottom:1px solid rgba(255,255,255,0.1)}
.image-card-title{font-size:0.85rem;font-weight:700;color:var(--light);display:flex;align-items:center;gap:8px}
.image-card-title .img-num{background:var(--primary);color:white;width:24px;height:24px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:0.75rem}
.image-card-actions{display:flex;gap:5px}
.image-card-actions button{background:transparent;border:1px solid rgba(255,255,255,0.2);color:#fff;padding:4px 8px;border-radius:5px;cursor:pointer;font-size:0.7rem;transition:all 0.2s}
.image-card-actions button:hover{background:var(--primary);border-color:var(--primary)}
.image-card-actions button.delete:hover{background:#c0392b;border-color:#c0392b}
.image-card-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.image-card-grid label{font-size:0.7rem;margin:4px 0 2px}
.image-card-grid input[type="range"]{margin:2px 0}
.image-card-toggle{text-align:center;color:var(--light);font-size:0.75rem;cursor:pointer;margin-top:8px;opacity:0.7;padding:4px;border-radius:6px;transition:all 0.2s}
.image-card-toggle:hover{opacity:1;background:rgba(255,255,255,0.05)}
.image-card-advanced{display:none;margin-top:10px;padding-top:10px;border-top:1px dashed rgba(255,255,255,0.1)}
.image-card-advanced.show{display:block}
.image-card-mask{display:grid;grid-template-columns:repeat(5,1fr);gap:4px;margin-top:6px}
.img-mask-btn{width:32px;height:32px;border-radius:6px;cursor:pointer;border:2px solid transparent;background:var(--secondary);display:flex;align-items:center;justify-content:center;font-size:1rem;transition:all 0.2s}
.img-mask-btn:hover{transform:scale(1.1)}
.img-mask-btn.active{border-color:var(--primary)}
.logo-section{background:linear-gradient(135deg,rgba(233,69,96,0.1),rgba(162,213,242,0.1));border:1px solid rgba(233,69,96,0.3)}
.logo-preview{width:100%;max-height:100px;object-fit:contain;border-radius:8px;margin:8px 0;background:rgba(0,0,0,0.3);padding:10px}
.logo-position-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:4px;margin:8px 0}
.logo-pos-btn{padding:8px;background:var(--dark);border:1px solid rgba(255,255,255,0.1);color:#fff;border-radius:6px;cursor:pointer;font-size:0.8rem;transition:all 0.2s}
.logo-pos-btn:hover{background:var(--secondary)}
.logo-pos-btn.active{background:var(--primary);border-color:var(--primary)}
.preview-area{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:20px;background:#0a0a1a;position:relative}
.canvas-container{position:relative;box-shadow:0 25px 80px rgba(0,0,0,0.6);border-radius:12px;overflow:hidden;border:2px solid rgba(255,255,255,0.05)}
canvas{display:block;max-width:85vw;max-height:75vh}
.stats{position:absolute;top:10px;right:15px;font-size:0.7rem;color:rgba(255,255,255,0.3);font-family:monospace}
.quick-actions{position:fixed;bottom:20px;right:20px;display:flex;flex-direction:column;gap:10px;z-index:100}
.quick-btn{width:50px;height:50px;border-radius:50%;background:var(--primary);color:white;border:none;cursor:pointer;font-size:1.2rem;box-shadow:0 4px 15px rgba(233,69,96,0.4);transition:all 0.3s;display:flex;align-items:center;justify-content:center}
.quick-btn:hover{transform:scale(1.1)}
.quick-btn.green{background:var(--success)}
.range-value{float:right;color:var(--primary);font-weight:700;font-size:0.78rem}
.preset-colors{display:flex;gap:5px;flex-wrap:wrap;margin-top:5px}
.color-preset{width:28px;height:28px;border-radius:50%;cursor:pointer;border:2px solid transparent;transition:all 0.3s}
.color-preset:hover{transform:scale(1.15)}
.color-preset.active{border-color:#fff;box-shadow:0 0 8px rgba(255,255,255,0.5)}
.checkbox-group{display:flex;gap:10px;flex-wrap:wrap}
.checkbox-group label{display:flex;align-items:center;gap:5px;cursor:pointer;background:#0f0f23;padding:5px 10px;border-radius:20px;font-size:0.72rem;border:1px solid rgba(255,255,255,0.1)}
.checkbox-group input[type="checkbox"]{accent-color:var(--primary)}
.two-col{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.three-col{display:grid;grid-template-columns:1fr 1fr 1fr;gap:6px}
.mask-preview{width:36px;height:36px;border-radius:8px;cursor:pointer;border:2px solid transparent;transition:all 0.3s;background:#0f0f23;display:flex;align-items:center;justify-content:center;font-size:1rem}
.mask-preview:hover{transform:scale(1.1)}
.mask-preview.active{border-color:var(--primary)}
.mask-grid{display:grid;grid-template-columns:repeat(5,1fr);gap:5px;margin-top:6px}
.tabs{display:flex;gap:4px;margin-bottom:10px;background:#0f0f23;padding:4px;border-radius:10px}
.tab{flex:1;padding:8px;text-align:center;cursor:pointer;border-radius:8px;font-size:0.75rem;font-weight:600;transition:all 0.2s;color:#9ca3af}
.tab.active{background:var(--primary);color:white}
.tab-content{display:none}
.tab-content.active{display:block}
.empty-state{text-align:center;padding:20px;color:rgba(255,255,255,0.3);font-size:0.85rem}
.empty-state-icon{font-size:2rem;margin-bottom:8px}
</style>

const canvas=document.getElementById('canvas');
const ctx=canvas.getContext('2d');
let imageData=[];

let logoSettings={position:'br',x:90,y:90,size:15,opacity:80,rotate:0,shadow:10,blur:0,blend:'source-over'};
let seed=Math.random()*10000;

function createImageDefaults(){
return{x:50,y:30,scale:40,rotate:0,opacity:100,shadow:20,blur:0,brightness:100,saturation:100,contrast:100,mask:'none',maskSize:80,maskBorder:0,maskBorderColor:'#ffffff'};
}

function initCanvas(){
const preset=document.getElementById('presetSize').value;
let w,h;
if(preset==='custom'){
w=parseInt(document.getElementById('width').value)||1080;
h=parseInt(document.getElementById('height').value)||1920;
}else{
[w,h]=preset.split(',').map(Number);
}
canvas.width=w;
canvas.height=h;
document.getElementById('stats').textContent=w+' x '+h+' px';
draw();
}

function draw(){
const w=canvas.width;
const h=canvas.height;
ctx.clearRect(0,0,w,h);
drawGradient(w,h);
if(document.getElementById('paperEffect').checked)drawPaperTexture(w,h);
if(document.getElementById('grainEffect').checked)drawGrain(w,h);
if(document.getElementById('noiseEffect').checked)drawNoise(w,h);
if(document.getElementById('smokeEffect').checked)drawSmoke(w,h);
if(document.getElementById('bokehEffect').checked)drawBokeh(w,h);
if(document.getElementById('lightEffect').checked)drawLightRays(w,h);
if(document.getElementById('waveEffect').checked)drawWave(w,h);
drawIndividualImages(w,h);
if(document.getElementById('dropsEffect').checked)drawDrops(w,h);
drawText(w,h);
if(logoImage)drawLogo(w,h);
if(document.getElementById('vignetteEffect').checked)drawVignette(w,h);
if(document.getElementById('glitchEffect').checked)drawGlitch(w,h);
}

function drawGradient(w,h){
const angle=(document.getElementById('gradientAngle').value*Math.PI)/180;
const intensity=document.getElementById('gradientIntensity').value/100;
const x1=w/2-Math.cos(angle)*w/2;
const y1=h/2-Math.sin(angle)*h/2;
const x2=w/2+Math.cos(angle)*w/2;
const y2=h/2+Math.sin(angle)*h/2;
const gradient=ctx.createLinearGradient(x1,y1,x2,y2);
gradient.addColorStop(0,document.getElementById('colorTop').value);
gradient.addColorStop(1,document.getElementById('colorBottom').value);
ctx.fillStyle=gradient;
ctx.globalAlpha=intensity;
ctx.fillRect(0,0,w,h);
ctx.globalAlpha=1;
}

function drawWave(w,h){
const waveY=h*0.55;
const colorTop=document.getElementById('colorTop').value;
const colorBottom=document.getElementById('colorBottom').value;
ctx.beginPath();
ctx.moveTo(0,waveY+15);
ctx.bezierCurveTo(w*0.25,waveY+35,w*0.75,waveY-5,w,waveY+15);
ctx.lineTo(w,h);ctx.lineTo(0,h);ctx.closePath();
ctx.fillStyle='rgba(0,0,0,0.12)';ctx.fill();
ctx.beginPath();
ctx.moveTo(0,waveY);
ctx.bezierCurveTo(w*0.3,waveY+20,w*0.7,waveY-20,w,waveY);
ctx.lineTo(w,h);ctx.lineTo(0,h);ctx.closePath();
const waveGrad=ctx.createLinearGradient(0,waveY,0,h);
waveGrad.addColorStop(0,colorTop);
waveGrad.addColorStop(1,adjustColor(colorBottom,-20));
ctx.fillStyle=waveGrad;ctx.fill();
ctx.beginPath();
ctx.moveTo(w*0.15,waveY+35);
ctx.bezierCurveTo(w*0.35,waveY+55,w*0.65,waveY+15,w*0.85,waveY+35);
ctx.strokeStyle='rgba(255,255,255,0.25)';ctx.lineWidth=2;ctx.stroke();
}

function drawIndividualImages(w,h){
imageData.forEach((data)=>{
const img=data.img;
const s=data.settings;
if(!img.complete)return;
ctx.save();
ctx.globalAlpha=s.opacity/100;
ctx.filter='brightness('+s.brightness+'%) saturate('+s.saturation+'%) contrast('+s.contrast+'%) blur('+s.blur+'px)';
if(s.shadow>0){
ctx.shadowColor='rgba(0,0,0,0.4)';
ctx.shadowBlur=s.shadow;
ctx.shadowOffsetX=4;
ctx.shadowOffsetY=6;
}
const x=(s.x/100)*w;
const y=(s.y/100)*h;
ctx.translate(x,y);
ctx.rotate((s.rotate*Math.PI)/180);
const maxSize=Math.min(w,h)*(s.scale/100);
const ratio=img.width/img.height;
let dw,dh;
if(ratio>1){dw=maxSize;dh=maxSize/ratio;}
else{dh=maxSize;dw=maxSize*ratio;}
const finalW=dw*(s.maskSize/100);
const finalH=dh*(s.maskSize/100);
if(s.mask!=='none'){
ctx.save();
createMaskPath(ctx,0,0,finalW,finalH,s.mask);
ctx.clip();
}
ctx.drawImage(img,-finalW/2,-finalH/2,finalW,finalH);
if(s.mask!=='none'){
ctx.restore();
if(s.maskBorder>0){
ctx.strokeStyle=s.maskBorderColor;
ctx.lineWidth=s.maskBorder;
createMaskPath(ctx,0,0,finalW,finalH,s.mask);
ctx.stroke();
}
}
ctx.restore();
});
}

function drawDrops(w,h){
const count=parseInt(document.getElementById('dropsIntensity').value);
const maxSize=parseInt(document.getElementById('dropsMaxSize').value);
const waveY=h*0.55;
const pr=(n)=>{const x=Math.sin(seed+n*137.5)*10000;return x-Math.floor(x);};
for(let i=0;i<count;i++){
const x=pr(i*3)*w;
const y=pr(i*3+1)*waveY;
const radius=2+pr(i*3+2)*maxSize;
ctx.save();
ctx.beginPath();
ctx.ellipse(x+radius*0.3,y+radius*0.4,radius*0.8,radius*0.6,0,0,Math.PI*2);
ctx.fillStyle='rgba(0,0,0,0.15)';ctx.fill();
ctx.beginPath();ctx.arc(x,y,radius,0,Math.PI*2);
const dropGrad=ctx.createRadialGradient(x-radius*0.25,y-radius*0.25,0,x,y,radius);
dropGrad.addColorStop(0,'rgba(255,255,255,0.95)');
dropGrad.addColorStop(0.3,'rgba(255,255,255,0.5)');
dropGrad.addColorStop(0.7,'rgba(255,255,255,0.15)');
dropGrad.addColorStop(1,'rgba(255,255,255,0.05)');
ctx.fillStyle=dropGrad;ctx.fill();
ctx.beginPath();
ctx.ellipse(x-radius*0.3,y-radius*0.35,radius*0.2,radius*0.12,-0.5,0,Math.PI*2);
ctx.fillStyle='rgba(255,255,255,0.98)';ctx.fill();
ctx.beginPath();ctx.arc(x+radius*0.4,y+radius*0.3,radius*0.08,0,Math.PI*2);
ctx.fillStyle='rgba(255,255,255,0.7)';ctx.fill();
ctx.beginPath();ctx.arc(x,y,radius,0,Math.PI*2);
ctx.strokeStyle='rgba(255,255,255,0.3)';ctx.lineWidth=0.5;ctx.stroke();
ctx.restore();
}
}

function drawSmoke(w,h){
const opacity=document.getElementById('smokeOpacity').value/100;
for(let i=0;i<20;i++){
const x=(Math.sin(seed+i*47.3)*0.5+0.5)*w;
const y=(Math.cos(seed+i*31.7)*0.5+0.5)*h*0.7;
const radius=60+(Math.sin(seed+i*73.1)*0.5+0.5)*200;
const grad=ctx.createRadialGradient(x,y,0,x,y,radius);
grad.addColorStop(0,'rgba(255,255,255,'+(opacity*0.25)+')');
grad.addColorStop(0.5,'rgba(255,255,255,'+(opacity*0.1)+')');
grad.addColorStop(1,'rgba(255,255,255,0)');
ctx.beginPath();ctx.arc(x,y,radius,0,Math.PI*2);
ctx.fillStyle=grad;ctx.fill();
}
}

function drawBokeh(w,h){
const count=parseInt(document.getElementById('bokehCount').value);
const size=parseInt(document.getElementById('bokehSize').value);
for(let i=0;i<count;i++){
const x=(Math.sin(seed+i*89.1)*0.5+0.5)*w;
const y=(Math.cos(seed+i*67.3)*0.5+0.5)*h;
const radius=10+(Math.sin(seed+i*53.7)*0.5+0.5)*size;
const hue=(Math.sin(seed+i*41.2)*0.5+0.5)*360;
const alpha=0.1+(Math.sin(seed+i*29.5)*0.5+0.5)*0.3;
const grad=ctx.createRadialGradient(x,y,0,x,y,radius);
grad.addColorStop(0,'hsla('+hue+',70%,70%,'+alpha+')');
grad.addColorStop(0.5,'hsla('+hue+',60%,60%,'+(alpha*0.5)+')');
grad.addColorStop(1,'hsla(0,0%,0%,0)');
ctx.beginPath();ctx.arc(x,y,radius,0,Math.PI*2);
ctx.fillStyle=grad;ctx.fill();
}
}

function drawLightRays(w,h){
const intensity=document.getElementById('lightIntensity').value/100;
const color=document.getElementById('lightColor').value;
const r=parseInt(color.slice(1,3),16);
const g=parseInt(color.slice(3,5),16);
const b=parseInt(color.slice(5,7),16);
ctx.save();ctx.globalCompositeOperation='screen';
for(let i=0;i<5;i++){
const angle=-Math.PI/2+(i-2)*0.3;
const grad=ctx.createLinearGradient(w/2+Math.cos(angle)*100,0,w/2+Math.cos(angle)*w,h);
grad.addColorStop(0,'rgba('+r+','+g+','+b+','+(intensity*0.4)+')');
grad.addColorStop(1,'rgba('+r+','+g+','+b+',0)');
ctx.beginPath();
ctx.moveTo(w/2+Math.cos(angle-0.15)*50,0);
ctx.lineTo(w/2+Math.cos(angle+0.15)*50,0);
ctx.lineTo(w/2+Math.cos(angle+0.3)*w*1.5,h);
ctx.lineTo(w/2+Math.cos(angle-0.3)*w*1.5,h);
ctx.closePath();ctx.fillStyle=grad;ctx.fill();
}
const centerGrad=ctx.createRadialGradient(w/2,h*0.2,0,w/2,h*0.2,w*0.4);
centerGrad.addColorStop(0,'rgba('+r+','+g+','+b+','+(intensity*0.3)+')');
centerGrad.addColorStop(1,'rgba('+r+','+g+','+b+',0)');
ctx.fillStyle=centerGrad;ctx.fillRect(0,0,w,h);
ctx.restore();
}

function drawVignette(w,h){
const intensity=document.getElementById('vignetteIntensity').value/100;
const grad=ctx.createRadialGradient(w/2,h/2,w*0.3,w/2,h/2,w*0.8);
grad.addColorStop(0,'rgba(0,0,0,0)');
grad.addColorStop(1,'rgba(0,0,0,'+intensity+')');
ctx.fillStyle=grad;ctx.fillRect(0,0,w,h);
}

function drawGlitch(w,h){
const imageData=ctx.getImageData(0,0,w,h);
const data=imageData.data;
for(let i=0;i<data.length;i+=4){
if(Math.random()<0.03){
const offset=(Math.random()-0.5)*20;
data[i]=Math.min(255,data[i]+offset);
data[i+1]=Math.min(255,data[i+1]-offset);
data[i+2]=Math.min(255,data[i+2]+offset*2);
}
}
ctx.putImageData(imageData,0,0);
}

function drawPaperTexture(w,h){
ctx.save();ctx.globalAlpha=0.06;
for(let i=0;i<8000;i++){
ctx.fillStyle=Math.random()>0.5?'#fff':'#000';
ctx.fillRect(Math.random()*w,Math.random()*h,1,1);
}
ctx.restore();
}

function drawGrain(w,h){
ctx.save();ctx.globalAlpha=0.04;
for(let i=0;i<5000;i++){
const shade=Math.random()*255;
ctx.fillStyle='rgb('+shade+','+shade+','+shade+')';
ctx.fillRect(Math.random()*w,Math.random()*h,2,2);
}
ctx.restore();
}

function drawNoise(w,h){
ctx.save();ctx.globalAlpha=0.03;
for(let i=0;i<10000;i++){
const val=Math.random()>0.5?255:0;
ctx.fillStyle='rgb('+val+','+val+','+val+')';
ctx.fillRect(Math.random()*w,Math.random()*h,1,1);
}
ctx.restore();
}

function drawText(w,h){
const mainText=document.getElementById('mainText').value;
const textColor=document.getElementById('textColor').value;
const textSize=parseInt(document.getElementById('textSize').value);
const fontFamily=document.getElementById('fontFamily').value;
const textWeight=document.getElementById('textWeight').value;
const textSpacing=document.getElementById('textSpacing').value;
const textShadow=parseInt(document.getElementById('textShadow').value);
const textStroke=parseInt(document.getElementById('textStroke').value);
const textStrokeColor=document.getElementById('textStrokeColor').value;
const textOpacity=document.getElementById('textOpacity').value/100;
const subText=document.getElementById('subText').value;
const subTextSize=parseInt(document.getElementById('subTextSize').value);
const subTextColor=document.getElementById('subTextColor').value;
const subFontFamily=document.getElementById('subFontFamily').value;
const subTextOpacity=document.getElementById('subTextOpacity').value/100;
const textY=h*0.72;

ctx.save();
ctx.font=textWeight+' '+textSize+'px '+fontFamily;
ctx.textAlign='center';
ctx.letterSpacing=textSpacing+'px';
if(textStroke>0){
ctx.strokeStyle=textStrokeColor;
ctx.lineWidth=textStroke;
ctx.lineJoin='round';
ctx.strokeText(mainText,w/2,textY);
}
if(textShadow>0){
ctx.shadowColor='rgba(0,0,0,0.5)';
ctx.shadowBlur=textShadow;
ctx.shadowOffsetX=3;
ctx.shadowOffsetY=4;
}
ctx.fillStyle=textColor;
ctx.globalAlpha=textOpacity;
ctx.fillText(mainText,w/2,textY);
ctx.restore();

if(subText){
ctx.save();
ctx.font=subTextSize+'px '+subFontFamily;
ctx.textAlign='center';
ctx.fillStyle=subTextColor;
ctx.globalAlpha=subTextOpacity;
const maxWidth=w*0.75;
const lineHeight=subTextSize*1.5;
const words=subText.split(' ');
let line='';
let lines=[];
words.forEach(word=>{
const testLine=line+word+' ';
const metrics=ctx.measureText(testLine);
if(metrics.width>maxWidth&&line!==''){
lines.push(line);line=word+' ';
}else{line=testLine;}
});
lines.push(line);
const startY=textY+textSize+25;
lines.forEach((line,i)=>{
ctx.fillText(line,w/2,startY+(i*lineHeight));
});
ctx.restore();
}
}

function drawLogo(w,h){
if(!logoImage||!logoImage.complete)return;
ctx.save();
ctx.globalAlpha=logoSettings.opacity/100;
ctx.globalCompositeOperation=logoSettings.blend;
let x,y;
if(logoSettings.position!=='custom'){
const positions={'tl':[10,10],'tc':[50,10],'tr':[90,10],'cl':[10,50],'cc':[50,50],'cr':[90,50],'bl':[10,90],'bc':[50,90],'br':[90,90]};
[x,y]=positions[logoSettings.position];
}else{
x=logoSettings.x;
y=logoSettings.y;
}
const logoX=(x/100)*w;
const logoY=(y/100)*h;
const maxLogoSize=Math.min(w,h)*(logoSettings.size/100);
const ratio=logoImage.width/logoImage.height;
let lw,lh;
if(ratio>1){lw=maxLogoSize;lh=maxLogoSize/ratio;}
else{lh=maxLogoSize;lw=maxLogoSize*ratio;}
ctx.translate(logoX,logoY);
ctx.rotate((logoSettings.rotate*Math.PI)/180);
if(logoSettings.shadow>0){
ctx.shadowColor='rgba(0,0,0,0.4)';
ctx.shadowBlur=logoSettings.shadow;
ctx.shadowOffsetX=2;
ctx.shadowOffsetY=3;
}
if(logoSettings.blur>0){
ctx.filter='blur('+logoSettings.blur+'px)';
}
ctx.drawImage(logoImage,-lw/2,-lh/2,lw,lh);
ctx.restore();
}

function createMaskPath(ctx,x,y,w,h,mask){
ctx.beginPath();
switch(mask){
case'circle':
ctx.arc(x,y,Math.max(w,h)/2,0,Math.PI*2);
break;
case'rounded':
const r=Math.min(w,h)*0.15;
ctx.moveTo(x-w/2+r,y-h/2);
ctx.lineTo(x+w/2-r,y-h/2);
ctx.quadraticCurveTo(x+w/2,y-h/2,x+w/2,y-h/2+r);
ctx.lineTo(x+w/2,y+h/2-r);
ctx.quadraticCurveTo(x+w/2,y+h/2,x+w/2-r,y+h/2);
ctx.lineTo(x-w/2+r,y+h/2);
ctx.quadraticCurveTo(x-w/2,y+h/2,x-w/2,y+h/2-r);
ctx.lineTo(x-w/2,y-h/2+r);
ctx.quadraticCurveTo(x-w/2,y-h/2,x-w/2+r,y-h/2);
break;
case'hexagon':
for(let i=0;i<6;i++){
const angle=(Math.PI/3)*i-Math.PI/6;
const px=x+Math.cos(angle)*w/2;
const py=y+Math.sin(angle)*h/2;
if(i===0)ctx.moveTo(px,py);else ctx.lineTo(px,py);
}
ctx.closePath();
break;
case'diamond':
ctx.moveTo(x,y-h/2);
ctx.lineTo(x+w/2,y);
ctx.lineTo(x,y+h/2);
ctx.lineTo(x-w/2,y);
ctx.closePath();
break;
case'star':
const outerR=Math.max(w,h)/2;
const innerR=outerR*0.4;
for(let i=0;i<10;i++){
const angle=(Math.PI/5)*i-Math.PI/2;
const r=i%2===0?outerR:innerR;
const px=x+Math.cos(angle)*r;
const py=y+Math.sin(angle)*r;
if(i===0)ctx.moveTo(px,py);else ctx.lineTo(px,py);
}
ctx.closePath();
break;
case'heart':
const size=Math.max(w,h)/2;
ctx.moveTo(x,y+size*0.3);
ctx.bezierCurveTo(x,y,x-size,y-size*0.5,x-size,y-size*0.1);
ctx.bezierCurveTo(x-size,y+size*0.4,x,y+size*0.8,x,y+size*0.8);
ctx.bezierCurveTo(x,y+size*0.8,x+size,y+size*0.4,x+size,y-size*0.1);
ctx.bezierCurveTo(x+size,y-size*0.5,x,y,x,y+size*0.3);
break;
case'cloud':
ctx.arc(x-w*0.2,y,h*0.25,0,Math.PI*2);
ctx.arc(x+w*0.2,y,h*0.25,0,Math.PI*2);
ctx.arc(x,y-h*0.1,h*0.3,0,Math.PI*2);
ctx.arc(x-w*0.1,y+h*0.1,h*0.2,0,Math.PI*2);
ctx.arc(x+w*0.1,y+h*0.1,h*0.2,0,Math.PI*2);
break;
case'blob':
ctx.moveTo(x+w*0.5,y);
for(let i=1;i<=8;i++){
const angle=(Math.PI*2/8)*i;
const r=(i%2===0)?Math.max(w,h)*0.45:Math.max(w,h)*0.35;
const cpx=x+Math.cos(angle-Math.PI/8)*r*1.3;
const cpy=y+Math.sin(angle-Math.PI/8)*r*1.3;
const px=x+Math.cos(angle)*r;
const py=y+Math.sin(angle)*r;
ctx.quadraticCurveTo(cpx,cpy,px,py);
}
ctx.closePath();
break;
case'triangle':
ctx.moveTo(x,y-h/2);
ctx.lineTo(x+w/2,y+h/2);
ctx.lineTo(x-w/2,y+h/2);
ctx.closePath();
break;
}
}

function adjustColor(color,amount){
const num=parseInt(color.replace('#',''),16);
const r=Math.max(0,Math.min(255,(num>>16)+amount));
const g=Math.max(0,Math.min(255,((num>>8)&0x00FF)+amount));
const b=Math.max(0,Math.min(255,(num&0x0000FF)+amount));
return'#'+((r<<16)|(g<<8)|b).toString(16).padStart(6,'0');
}

document.getElementById('imageInput').addEventListener('change',function(e){
const files=Array.from(e.target.files);
files.forEach(file=>{
const reader=new FileReader();
reader.onload=function(event){
const img=new Image();
img.onload=function(){
imageData.push({
img:img,
settings:createImageDefaults(),
name:file.name,
id:Date.now()+Math.random()
});
renderImageCards();
draw();
};
img.src=event.target.result;
};
reader.readAsDataURL(file);
});
});

function renderImageCards(){
const container=document.getElementById('imagesContainer');
if(imageData.length===0){
container.innerHTML='<div class="empty-state"><div class="empty-state-icon">-</div>Sube imagenes para ver controles individuales</div>';
return;
}
container.innerHTML='';
imageData.forEach((data,index)=>{
const card=document.createElement('div');
card.className='image-card';
card.innerHTML=`<div class="image-card-header"><div class="image-card-title"><span class="img-num">${index+1}</span><span>${data.name.substring(0,20)}${data.name.length>20?'...':''}</span></div><div class="image-card-actions"><button onclick="moveImageUp(${index})" title="Subir">u</button><button onclick="moveImageDown(${index})" title="Bajar">d</button><button onclick="duplicateImage(${index})" title="Duplicar">c</button><button class="delete" onclick="removeImage(${index})" title="Eliminar">x</button></div></div><div class="image-card-grid"><div><label>Pos X:<span class="range-value">${data.settings.x}%</span></label><input type="range" min="0" max="100" value="${data.settings.x}" oninput="updateImageSetting(${index},'x',this.value)"></div><div><label>Pos Y:<span class="range-value">${data.settings.y}%</span></label><input type="range" min="0" max="100" value="${data.settings.y}" oninput="updateImageSetting(${index},'y',this.value)"></div><div><label>Tamano:<span class="range-value">${data.settings.scale}%</span></label><input type="range" min="10" max="100" value="${data.settings.scale}" oninput="updateImageSetting(${index},'scale',this.value)"></div><div><label>Rotacion:<span class="range-value">${data.settings.rotate}deg</span></label><input type="range" min="-180" max="180" value="${data.settings.rotate}" oninput="updateImageSetting(${index},'rotate',this.value)"></div></div><div class="image-card-toggle" onclick="toggleImageAdvanced(${index})">v Opciones avanzadas</div><div class="image-card-advanced" id="img-adv-${index}"><div class="image-card-grid"><div><label>Opacidad:<span class="range-value">${data.settings.opacity}%</span></label><input type="range" min="10" max="100" value="${data.settings.opacity}" oninput="updateImageSetting(${index},'opacity',this.value)"></div><div><label>Sombra:<span class="range-value">${data.settings.shadow}px</span></label><input type="range" min="0" max="50" value="${data.settings.shadow}" oninput="updateImageSetting(${index},'shadow',this.value)"></div><div><label>Brillo:<span class="range-value">${data.settings.brightness}%</span></label><input type="range" min="50" max="150" value="${data.settings.brightness}" oninput="updateImageSetting(${index},'brightness',this.value)"></div><div><label>Saturacion:<span class="range-value">${data.settings.saturation}%</span></label><input type="range" min="0" max="200" value="${data.settings.saturation}" oninput="updateImageSetting(${index},'saturation',this.value)"></div><div><label>Contraste:<span class="range-value">${data.settings.contrast}%</span></label><input type="range" min="50" max="150" value="${data.settings.contrast}" oninput="updateImageSetting(${index},'contrast',this.value)"></div><div><label>Desenfoque:<span class="range-value">${data.settings.blur}px</span></label><input type="range" min="0" max="20" value="${data.settings.blur}" oninput="updateImageSetting(${index},'blur',this.value)"></div></div><label style="margin-top:6px;">Mascara:</label><div class="image-card-mask"><div class="img-mask-btn ${data.settings.mask==='none'?'active':''}" onclick="updateImageSetting(${index},'mask','none')" title="Ninguna">N</div><div class="img-mask-btn ${data.settings.mask==='circle'?'active':''}" onclick="updateImageSetting(${index},'mask','circle')" title="Circulo">C</div><div class="img-mask-btn ${data.settings.mask==='rounded'?'active':''}" onclick="updateImageSetting(${index},'mask','rounded')" title="Redondeado">R</div><div class="img-mask-btn ${data.settings.mask==='hexagon'?'active':''}" onclick="updateImageSetting(${index},'mask','hexagon')" title="Hexagono">H</div><div class="img-mask-btn ${data.settings.mask==='diamond'?'active':''}" onclick="updateImageSetting(${index},'mask','diamond')" title="Diamante">D</div></div><label style="margin-top:6px;">Tamano mascara:<span class="range-value">${data.settings.maskSize}%</span></label><input type="range" min="20" max="100" value="${data.settings.maskSize}" oninput="updateImageSetting(${index},'maskSize',this.value)"><label>Borde mascara:<span class="range-value">${data.settings.maskBorder}px</span></label><input type="range" min="0" max="20" value="${data.settings.maskBorder}" oninput="updateImageSetting(${index},'maskBorder',this.value)"><label>Color borde:<input type="color" value="${data.settings.maskBorderColor}" oninput="updateImageSetting(${index},'maskBorderColor',this.value)"></label></div>`;
container.appendChild(card);
});
}

function updateImageSetting(index,property,value){
if(index<0||index>=imageData.length)return;
const s=imageData[index].settings;
if(property==='mask'||property==='maskBorderColor'){
s[property]=value;
}else{
s[property]=parseInt(value);
}
renderImageCards();
draw();
}

function toggleImageAdvanced(index){
const el=document.getElementById('img-adv-'+index);
el.classList.toggle('show');
}

function moveImageUp(index){
if(index<=0)return;
[imageData[index-1],imageData[index]]=[imageData[index],imageData[index-1]];
renderImageCards();
draw();
}

function moveImageDown(index){
if(index>=imageData.length-1)return;
[imageData[index],imageData[index+1]]=[imageData[index+1],imageData[index]];
renderImageCards();
draw();
}

function duplicateImage(index){
if(index<0||index>=imageData.length)return;
const original=imageData[index];
const newData={
img:original.img,
name:original.name+' (copia)',
settings:{...original.settings}
};
imageData.splice(index+1,0,newData);
renderImageCards();
draw();
}

function removeImage(index){
imageData.splice(index,1);
renderImageCards();
draw();
}

// ===== LOGO =====
document.getElementById('logoInput').addEventListener('change',function(e){
const file=e.target.files[0];
if(!file)return;
const reader=new FileReader();
reader.onload=function(event){
logoImage=new Image();
logoImage.onload=function(){
document.getElementById('logoPreview').src=event.target.result;
document.getElementById('logoPreviewContainer').style.display='block';
draw();
};
logoImage.src=event.target.result;
};
reader.readAsDataURL(file);
});

function removeLogo(){
logoImage=null;
document.getElementById('logoPreviewContainer').style.display='none';
document.getElementById('logoInput').value='';
draw();
}

'vignetteIntensity':v=>v+'%',
'logoX':v=>v+'%','logoY':v=>v+'%',
'logoSize':v=>v+'%','logoOpacity':v=>v+'%',

});
}
});

function downloadHD(){

const tempCtx=tempCanvas.getContext('2d');
tempCanvas.width=canvas.width*2;
tempCanvas.height=canvas.height*2;
const originalW=canvas.width;
const originalH=canvas.height;
canvas.width=tempCanvas.width;
canvas.height=tempCanvas.height;
draw();
const link=document.createElement('a');
link.download='fresh-design-HD-'+Date.now()+'.png';
link.href=canvas.toDataURL('image/png',1.0);
link.click();
canvas.width=originalW;
canvas.height=originalH;
draw();
}
