<script>
  // Inicializar Firebase
  const firebaseConfig = {

    messagingSenderId: "888658236080",
    appId: "1:888658236080:web:506e5e2085b5a452dba175"
  };
  firebase.initializeApp(firebaseConfig);
  const db = firebase.firestore();

  let productosCatalogo = {};
  let productosFirestore = [];

  // --- Funciones existentes (sin cambios críticos) ---
 async function cargarCatalogo() {
  try {
    const response = await fetch("https://wil1979.github.io/esentia-factura/productos_esentia.json");
    if (!response.ok) throw new Error("HTTP error " + response.status);

    const data = await response.json();

    productosCatalogo = {};

    // 🔹 Caso 1: Array directo
    if (Array.isArray(data)) {
      data.forEach(p => {
        if (p.id != null) productosCatalogo[String(p.id)] = p;
      });
    }

    // 🔹 Caso 2: Objeto por categorías (tu caso real)
    else if (typeof data === "object") {
      Object.values(data).forEach(categoria => {
        if (Array.isArray(categoria)) {
          categoria.forEach(p => {
            if (p.id != null) productosCatalogo[String(p.id)] = p;
          });
        }
      });
    }

    console.log("✅ Catálogo cargado:", Object.keys(productosCatalogo).length, "productos");

    if (document.getElementById('fuenteProductos').value === 'firebase') {
      cargarProductosDeFirestore();    


    }

  } catch (error) {
    console.error("❌ Error al cargar catálogo:", error);
    document.getElementById('listaCheckboxes').innerHTML =
      `<em>Error al cargar catálogo: ${error.message}</em>`;
  }
}

async function cargarProductosDeFirestore() {
  const listaDiv = document.getElementById('listaCheckboxes');
  listaDiv.innerHTML = '<em>Cargando stock...</em>';
  
  try {
    const snapshot = await db.collection('stock').get();
    const productosConDatos = [];
    
    // 🔹 Función auxiliar para limpiar valores double-stringified
    const limpiarValor = (val) => {
      if (typeof val === 'string' && val.startsWith('"') && val.endsWith('"')) {
        return val.slice(1, -1); // Remover comillas externas
      }
      return val;
    };
    
    // 🔹 Función para extraer datos del documento (adaptable a ambas estructuras)
    const extraerDatos = (doc) => {
      const data = doc.data();
      
      // Caso 1: Estructura nueva anidada con stock.fields
      if (data.stock?.fields) {
        const fields = data.stock.fields;
        return {
          id: limpiarValor(fields.id) || doc.id,
          nombre: limpiarValor(fields.nombre) || 'Sin nombre',
          cantidad: parseInt(limpiarValor(fields.cantidad)) || 0,
          imagen: limpiarValor(fields.imagen) || null,
          ...Object.fromEntries(
            Object.entries(fields).map(([k, v]) => [k, limpiarValor(v)])
          )
        };
      }
      
      // Caso 2: Estructura tradicional (campos directos)
      return {
        id: data.id || doc.id,
        nombre: data.nombre || 'Sin nombre',
        cantidad: parseInt(data.cantidad) || 0,
        imagen: data.imagen || null,
        ...data
      };
    };
    
    snapshot.forEach(doc => {
      const stockData = extraerDatos(doc);
      const rawId = stockData.id;
      
      if (rawId == null) return;
      
      const cantidad = stockData.cantidad || 0;
      if (cantidad <= 0) return; // Solo productos con stock
      
      const stockId = String(rawId).trim();
      let nombreMostrar = stockData.nombre || stockId;
      let urlImagen = stockData.imagen;
      
      // 🔹 Intentar obtener datos del catálogo local
      const catalogoItem = productosCatalogo[stockId];
      if (catalogoItem) {
        if (catalogoItem.nombre) nombreMostrar = catalogoItem.nombre;
        if (catalogoItem.imagen) urlImagen = catalogoItem.imagen;
      }
      
      // 🔹 Fallback para imagen
      if (!urlImagen) {
        const nombreLimpio = nombreMostrar
          .normalize('NFD')
          .replace(/[\u0300-\u036f]/g, '')
          .replace(/\s+/g, '')
          .toLowerCase();
        urlImagen = `https://wil1979.github.io/esentia-factura/etiqueta/${nombreLimpio}.png`;
      }
      
      productosConDatos.push({ 
        id: stockId,
        nombre: nombreMostrar.trim(), 
        imagen: urlImagen,
        cantidad: cantidad
      });
    });
    
    productosConDatos.sort((a, b) => a.nombre.localeCompare(b.nombre));
    productosFirestore = productosConDatos;
    
    // 🔹 Resto de tu código (cantidad global, renderizado, listeners)
    const cantidadGlobal = parseInt(document.getElementById('cantidadPorProducto').value) || 17;
    
    listaDiv.innerHTML = productosConDatos.length === 0 
      ? '<em>No hay productos en stock.</em>' 
      : productosConDatos.map(p => {
          const cantidadProd = p.cantidadPersonalizada || cantidadGlobal;
          let stockColor = '#28a745';
          let stockLabel = 'disponibles';
          if (p.cantidad < 10) {
            stockColor = '#dc3545';
            stockLabel = '¡poco stock!';
          } else if (p.cantidad < 50) {
            stockColor = '#ffc107';
          }
          
          return `
            <div class="producto-item" style="display:flex;align-items:flex-start;gap:8px;margin:6px 0;padding:6px;border:1px solid #e0e0e0;border-radius:6px;background:#fafafa;flex-wrap:wrap;">
              <input type="checkbox" name="producto" value="${p.nombre}" id="chk_${p.id}" checked style="margin:4px 0 0 0;cursor:pointer;">
              <div style="flex:1;min-width:150px;">
                <label for="chk_${p.id}" style="font-size:12px;font-weight:600;cursor:pointer;color:#333;display:block;">${p.nombre}</label>
                <div style="font-size:10px;color:#666;margin-top:2px;display:flex;gap:8px;flex-wrap:wrap;">
                  <span style="background:#e8f5e9;color:#2e7d32;padding:1px 6px;border-radius:3px;">📦 Stock: <strong>${p.cantidad}</strong> ${stockLabel}</span>
                  <span style="background:#e3f2fd;color:#1565c0;padding:1px 6px;border-radius:3px;">🏷️ ID: <strong>${p.id}</strong></span>
                </div>
                <div style="margin-top:4px;display:flex;align-items:center;gap:4px;">
                  <span style="font-size:10px;color:#666;">Etiquetas a imprimir:</span>
                  <input type="number" class="cantidad-individual" data-producto="${p.nombre}" data-id="${p.id}" value="${cantidadProd}" min="1" max="999" style="width:60px;padding:3px 5px;font-size:11px;text-align:center;border:1px solid #ccc;border-radius:3px;">
                  <span style="font-size:10px;color:#666;">unds</span>
                </div>
              </div>
            </div>
          `;
        }).join('');
    
    // 🔹 Listeners (sin cambios)
    document.querySelectorAll('#listaCheckboxes input[type="checkbox"]').forEach(checkbox => {
      checkbox.addEventListener('change', () => {
        actualizarContadorSeleccionados();
        generarEtiquetas();
        calcularCabidaDTF();
        calcularProduccionGlobal();
      });
    });
    
    document.querySelectorAll('.cantidad-individual').forEach(input => {
      input.addEventListener('change', (e) => {
        const nombre = e.target.dataset.producto;
        const id = e.target.dataset.id;
        let nuevoValor = parseInt(e.target.value) || 1;
        if (nuevoValor < 1) { nuevoValor = 1; e.target.value = 1; }
        if (nuevoValor > 999) { nuevoValor = 999; e.target.value = 999; }
        const producto = productosFirestore.find(p => p.id === id);
        if (producto) producto.cantidadPersonalizada = nuevoValor;
        generarEtiquetas();
        calcularProduccionGlobal();
        e.target.style.background = '#d4edda';
        setTimeout(() => e.target.style.background = '', 300);
      });
      input.addEventListener('input', (e) => {
        e.target.value = e.target.value.replace(/[^0-9]/g, '');
      });
    });
    
    actualizarContadorSeleccionados();
    generarEtiquetas();
    calcularCabidaDTF();
    calcularProduccionGlobal();
    
  } catch (error) {
    console.error("❌ Error al cargar stock:", error);
    listaDiv.innerHTML = `<em>Error al cargar stock: ${error.message}</em>`;
  }
}
  function obtenerCantidadProducto(nombreProducto) {
  // Buscar input de cantidad individual para este producto
  const inputCustom = document.querySelector(`.cantidad-individual[data-producto="${nombreProducto}"]`);
  
  if (inputCustom && inputCustom.value) {
    const val = parseInt(inputCustom.value);
    if (!isNaN(val) && val > 0) return val;
  }
  
  // Si no hay valor custom, usar el global
  return parseInt(document.getElementById('cantidadPorProducto').value) || 1;
}

function guardarPreferenciasPrecio() {
  const prefs = {
    color: document.getElementById('precioColor')?.value,
    tamano: document.getElementById('precioTamano')?.value,
    estilo: document.getElementById('precioEstilo')?.value,
    alineacion: document.getElementById('precioAlineacion')?.value,
    subrayado: document.getElementById('precioSubrayado')?.checked,
    fondo: document.getElementById('precioFondo')?.checked
  };
  localStorage.setItem('esentia_precio_estilo', JSON.stringify(prefs));
}

function cargarPreferenciasPrecio() {
  const prefs = JSON.parse(localStorage.getItem('esentia_precio_estilo'));
  if (prefs) {
    if (document.getElementById('precioColor')) 
      document.getElementById('precioColor').value = prefs.color || '#dc3545';
    if (document.getElementById('precioTamano')) 
      document.getElementById('precioTamano').value = prefs.tamano || '10';
    if (document.getElementById('precioEstilo')) 
      document.getElementById('precioEstilo').value = prefs.estilo || 'bold';
    if (document.getElementById('precioAlineacion')) 
      document.getElementById('precioAlineacion').value = prefs.alineacion || 'center';
    if (document.getElementById('precioSubrayado')) 
      document.getElementById('precioSubrayado').checked = prefs.subrayado || false;
    if (document.getElementById('precioFondo')) 
      document.getElementById('precioFondo').checked = prefs.fondo || false;
    
    // Aplicar estilos cargados
    aplicarEstiloPrecio();
  }
}

function aplicarEstiloPrecio() {
  // Obtener valores de los controles
  const color = document.getElementById('precioColor')?.value || '#dc3545';
  const tamano = document.getElementById('precioTamano')?.value || '10';
  const estilo = document.getElementById('precioEstilo')?.value || 'bold';
  const alineacion = document.getElementById('precioAlineacion')?.value || 'center';
  const subrayado = document.getElementById('precioSubrayado')?.checked ? 'underline' : 'none';
  const fondo = document.getElementById('precioFondo')?.checked;
  
  // Aplicar a variables CSS
  document.documentElement.style.setProperty('--precio-color', color);
  document.documentElement.style.setProperty('--precio-tamano', `${tamano}px`);
  document.documentElement.style.setProperty('--precio-estilo', estilo);
  document.documentElement.style.setProperty('--precio-alineacion', alineacion);
  document.documentElement.style.setProperty('--precio-subrayado', subrayado);
  document.documentElement.style.setProperty('--precio-fondo', fondo ? 'rgba(221, 212, 191, 0.1)' : 'transparent');
  
  // Actualizar clase de fondo en etiquetas existentes
  document.querySelectorAll('.precio').forEach(el => {
    if (fondo) {
      el.classList.add('con-fondo');
    } else {
      el.classList.remove('con-fondo');
    }
  });
  
  // Regenerar etiquetas para aplicar cambios inmediatos
  generarEtiquetas();
  
  // Guardar preferencias
  guardarPreferenciasPrecio();
}

async function exportarPNGDTF() {

  const hoja = document.getElementById('hojaEtiquetas');
  const btn = document.getElementById('btnPNGFlotante');

  const originalText = btn.innerHTML;
  btn.innerHTML = "⏳ Generando PNG...";
  btn.disabled = true;

  try {

    // 🔥 Escala alta para calidad profesional
    const canvas = await html2canvas(hoja, {
      //scale: 4, // 4x resolución
      scale: window.devicePixelRatio * 3,
      useCORS: true,
      backgroundColor: null // 👈 FONDO TRANSPARENTE REAL
    });

    // Crear PNG con alpha
    const imgData = canvas.toDataURL("image/png");

    // Descargar automáticamente
    const link = document.createElement("a");
    link.href = imgData;
    link.download = "etiquetas-dtf-transparente.png";
    link.click();

  } catch (error) {
    console.error("Error al exportar PNG:", error);
    alert("Error al generar PNG");
  } finally {
    btn.innerHTML = originalText;
    btn.disabled = false;
  }
}

// 🔹 Función principal corregida
function generarEtiquetas() {
  // 🔒 Obtener valores con validación de nulidad
  const config = {
    ancho: parseFloat(getIdValue('anchoEtiqueta', '2')) || 2,
    alto: parseFloat(getIdValue('altoEtiqueta', '4')) || 4,
    fuente: parseInt(getIdValue('tamanoFuente', '8')) || 8,
    tamanoNombre: parseInt(getIdValue('tamanoNombre', '11')) || 11,
    logo: getIdValue('logoUrl', 'https://wil1979.github.io/esentia-factura/images/logo.png').trim(),
    anchoLogo: parseInt(getIdValue('anchoLogo', '65')) || 65,
    precio: getIdValue('precioProducto', ''),
    cantidad: parseInt(getIdValue('cantidadPorProducto', '17')) || 17,
    forma: getIdValue('formaEtiqueta', 'redondeada'),
    tamanoImagen: parseInt(getIdValue('tamanoImagen', '74')) || 74
  };

  // Validación para etiquetas redondas
  if (config.forma === "redonda" && Math.abs(config.ancho - config.alto) > 0.1) {
    // Solo advertencia, no bloqueamos
    console.warn("⚠️ Para forma redonda, se recomienda ancho igual a alto");
  }

  // 🔹 Aplicar variables CSS
document.documentElement.style.setProperty('--ancho-etiqueta', `${config.ancho}cm`);
document.documentElement.style.setProperty('--alto-etiqueta', `${config.alto}cm`);
document.documentElement.style.setProperty('--tamano-fuente', `${config.fuente}px`);
document.documentElement.style.setProperty('--tamano-nombre', `${config.tamanoNombre}px`);
document.documentElement.style.setProperty('--ancho-logo', `${config.anchoLogo}px`);
document.documentElement.style.setProperty('--border-radius',
  config.forma === "redonda" ? "50%" :
  config.forma === "redondeada" ? "10px" : "0px"  // ← 0px para DTF

  );

  if (config.forma === "redonda") {
    const diametro = Math.min(config.ancho, config.alto);
    document.documentElement.style.setProperty('--diametro-etiqueta', `${diametro}cm`);
  }

  // 🔹 Limpiar contenedor
  const contenedor = document.getElementById('hojaEtiquetas');
  if (!contenedor) {
    console.error("❌ No se encontró el contenedor 'hojaEtiquetas'");
    return;
  }
  
  contenedor.className = 'hoja';
  contenedor.innerHTML = '';

  // Configurar grid
  contenedor.style.gridTemplateColumns =
    `repeat(auto-fill, ${config.forma === "redonda"
      ? Math.min(config.ancho, config.alto)
      : config.ancho}cm)`;

  // 🔹 Obtener productos según fuente
  let productosConDatos = [];
  const fuente = getIdValue('fuenteProductos', 'manual');

  if (fuente === 'manual') {
    const listaInput = document.getElementById('listaProductos');
    const nombres = listaInput 
      ? listaInput.value.split(',').map(p => p.trim()).filter(p => p)
      : [];
      
    productosConDatos = nombres.map(nombre => {
      const nombreLimpio = nombre
        .normalize('NFD')
        .replace(/[\u0300-\u036f]/g, '')
        .replace(/\s+/g, '')
        .toLowerCase();
      return {
        nombre: nombre,
        imagen: `https://wil1979.github.io/esentia-factura/etiqueta/${nombreLimpio}.png`
      };
    });
  } else {
    // Modo Firebase
    const checks = document.querySelectorAll('#listaCheckboxes input[type="checkbox"]:checked');
    const nombresSeleccionados = Array.from(checks).map(cb => cb.value);
    productosConDatos = productosFirestore.filter(p => nombresSeleccionados.includes(p.nombre));
  }

  // 🔹 Actualizar UI
  actualizarContadorSeleccionados();
  actualizarHoja();
  calcularCabidaDTF();
  calcularProduccionGlobal();
  guardarPreferenciasVisibilidad();

  // 🔹 Generar etiquetas en el DOM
productosConDatos.forEach(producto => {
  const cantidadFinal = obtenerCantidadProducto(producto.nombre);
  
  // 🔹 Obtener estado de visibilidad de cada elemento (con fallback seguro)
  const mostrarLogo = document.getElementById('mostrarLogo')?.checked ?? true;
  const mostrarNombre = document.getElementById('mostrarNombre')?.checked ?? true;
  const mostrarImagen = document.getElementById('mostrarImagen')?.checked ?? true;
  const mostrarPrecio = document.getElementById('mostrarPrecio')?.checked ?? true;
  
  for (let i = 0; i < cantidadFinal; i++) {
    const etiqueta = document.createElement('div');
    etiqueta.className = 'etiqueta';
    if (config.forma === "redonda") etiqueta.classList.add('redonda');
    
    // 🔹 Construir HTML condicionalmente
    let contenidoHTML = '';
    
    // 🏷️ Logo (opcional)
    if (mostrarLogo) {
      contenidoHTML += `<div class="etiqueta-logo"><img src="${config.logo}" class="logo" alt="Logo" onerror="this.remove()"></div>`;
    }
    
    // 📝 Nombre del producto (opcional)
    if (mostrarNombre) {
      contenidoHTML += `<div class="nombre-producto">${producto.nombre}</div>`;
    }
    
    // 🖼️ Imagen del producto (opcional)
    if (mostrarImagen) {
      contenidoHTML += `
        <div class="imagen-contenedor" style="flex-grow:1; display:flex; align-items:center; justify-content:center;">
          <img src="${producto.imagen}" class="imagen-producto" alt="${producto.nombre}" 
               onerror="this.parentElement.innerHTML='<div style=\\'color:#888;font-size:6px;\\'>IMG</div>'">
        </div>
      `;
    }
    
    // 💰 Precio (opcional)
if (mostrarPrecio && config.precio && config.precio.trim() !== '') {
  const tieneFondo = document.getElementById('precioFondo')?.checked;
  contenidoHTML += `<div class="precio${tieneFondo ? ' con-fondo' : ''}">${config.precio}</div>`;
}
    
    // 🔹 Asignar contenido y clases dinámicas
    etiqueta.innerHTML = contenidoHTML;
    
    // Clases para ajustar diseño según elementos visibles
    if (!mostrarImagen) etiqueta.classList.add('sin-imagen');
    const activos = [mostrarLogo, mostrarNombre, mostrarImagen, (mostrarPrecio && config.precio)].filter(Boolean).length;
    if (activos <= 1) etiqueta.classList.add('minimalista');
    
    contenedor.appendChild(etiqueta);
 
     
    }
  });
}

 function calcularProduccionGlobal() {
  if (!window.capacidadLaminaDTF || window.capacidadLaminaDTF === 0) return;

  const etiquetasPorLamina = window.capacidadLaminaDTF;
  const checks = document.querySelectorAll('#listaCheckboxes input[type="checkbox"]:checked');
  
  let totalUnidades = 0;
  let detalles = [];

  checks.forEach(checkbox => {
    const nombre = checkbox.value;
    const cantidad = obtenerCantidadProducto(nombre); // ← Usa cantidad individual
    totalUnidades += cantidad;
    detalles.push({ nombre, cantidad });
  });

  if (totalUnidades === 0) return;

  const laminasNecesarias = Math.ceil(totalUnidades / etiquetasPorLamina);
  const sobrante = (laminasNecesarias * etiquetasPorLamina) - totalUnidades;

  const info = document.getElementById("infoProduccion");
  
  // Mostrar resumen detallado (opcional, colapsable)
  const resumenDetalles = detalles.length <= 5 
    ? detalles.map(d => `<small>${d.nombre}: ${d.cantidad}</small>`).join('<br>')
    : `<small>...${detalles.length} productos seleccionados</small>`;

  info.innerHTML = `
    🧵 <strong>Producción Dinámica</strong><br>
    📦 Total etiquetas a imprimir: <strong>${totalUnidades}</strong><br>
    🖨️ Láminas necesarias: <strong>${laminasNecesarias}</strong><br>
    ♻️ Sobrante estimado: ${sobrante} etiquetas<br>
    ${resumenDetalles}
  `;
}
 function calcularCabidaDTF() {

  const hoja = document.getElementById('hojaEtiquetas');

  const anchoHojaCM = hoja.offsetWidth / 37.795;  // px → cm
  const altoHojaCM = hoja.offsetHeight / 37.795;

  const anchoEtiqueta = parseFloat(
    getComputedStyle(document.documentElement)
      .getPropertyValue('--ancho-etiqueta')
  );

  const altoEtiqueta = parseFloat(
    getComputedStyle(document.documentElement)
      .getPropertyValue('--alto-etiqueta')
  );

  if (!anchoEtiqueta || !altoEtiqueta) return;

  const columnas = Math.floor(anchoHojaCM / anchoEtiqueta);
  const filas = Math.floor(altoHojaCM / altoEtiqueta);

  const total = columnas * filas;

  window.capacidadLaminaDTF = total;

  const info = document.getElementById("infoProduccion");

  info.innerHTML = `
    🧵 <strong>Producción Dinámica</strong><br>
    📏 ${columnas} columnas x ${filas} filas<br>
    🎯 <strong>${total} etiquetas por lámina</strong>
  `;
}

});

pdf.addImage(imgData, 'PNG', 0, 0, widthMM, heightMM);
