<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>📊 Reportes de Ventas - Esentia</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
  <script type="module">
    // 🔥 Firebase Config (igual que clientes.js)
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.5/firebase-app.js";
    import {
      getFirestore, collection, getDocs, doc, getDoc, query, where, orderBy
    } from "https://www.gstatic.com/firebasejs/10.12.5/firebase-firestore.js";

    const firebaseConfig = {
      apiKey: "AIzaSyDuMNZrLgxBs6CbuPp8j0iyynejt6WCpnQ",
      authDomain: "esentia-factura-8345f.firebaseapp.com",
      projectId: "esentiacreditos-8345f",
      storageBucket: "esentiacreditos-8345f.firebasestorage.app",
      messagingSenderId: "888658236080",
      appId: "1:888658236080:web:506e5e2085b5a452dba175"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);

    // ===============================
    // 📊 Estado global
    // ===============================
    let todasLasVentas = [];
    let clientesCache = {};
    let reporteActual = 'por-dia'; // 'por-dia' | 'por-producto'
    let facturaActualParaEnvio = null;

    // ===============================
    // 📥 Cargar datos
    // ===============================
    async function cargarDatosReporte() {
      try {
        document.getElementById('loading').style.display = 'flex';
        
        // 1. Cargar clientes base para nombres
        const snapClientes = await getDocs(collection(db, "clientesBD"));
        snapClientes.forEach(doc => {
          clientesCache[doc.id] = { id: doc.id, ...doc.data() };
        });

        // 2. Cargar TODAS las facturas (compras por cliente)
        todasLasVentas = [];
        const snapFacturas = await getDocs(collection(db, "facturas"));
        
        for (const docSnap of snapFacturas.docs) {
          const clienteId = docSnap.id;
          const cliente = clientesCache[clienteId] || { nombre: 'Cliente #' + clienteId.slice(0,5), telefono: '' };
          const data = docSnap.data();
          const compras = data.compras || [];
          
          compras.forEach(compra => {
            // Normalizar estructura de compra
            const productos = compra.productos || [];
            const fecha = compra.fecha ? new Date(compra.fecha) : null;
            const monto = Number(compra.total ?? (compra.monto - (compra.descuento || 0)));
            const pagado = Number(compra.pagado || 0);
            const saldo = Math.max(0, monto - pagado);
            
            productos.forEach(producto => {
              todasLasVentas.push({
                clienteId,
                clienteNombre: cliente.nombre || 'Sin nombre',
                clienteTelefono: cliente.telefono || '',
                fecha: fecha ? fecha.toISOString().split('T')[0] : 'Sin fecha',
                fechaCompleta: fecha ? fecha : null,
                producto: producto.nombre || producto.codigo || 'Producto sin nombre',
                cantidad: Number(producto.cantidad || 1),
                precioUnitario: Number(producto.precio || producto.precioPublico || 0),
                subtotal: Number(producto.cantidad || 1) * Number(producto.precio || producto.precioPublico || 0),
                montoTotalFactura: monto,
                pagadoTotalFactura: pagado,
                saldoTotalFactura: saldo,
                metodoPago: compra.metodoPago || 'Pendiente',
                compraId: compra.id || Math.random().toString(36).substr(2, 9)
              });
            });
          });
        }
        
        document.getElementById('loading').style.display = 'none';
        renderizarReporte();
        actualizarResumen();
      } catch (error) {
        console.error("Error cargando datos:", error);
        document.getElementById('loading').style.display = 'none';
        alert("❌ Error al cargar los datos de ventas: " + error.message);
      }
    }

    // ===============================
    // 📅 Filtrar por rango de fechas
    // ===============================
    function filtrarPorFechas() {
      const fechaDesde = document.getElementById('fecha-desde').value;
      const fechaHasta = document.getElementById('fecha-hasta').value;
      
      if (fechaDesde && fechaHasta && new Date(fechaDesde) > new Date(fechaHasta)) {
        alert("❌ La fecha 'Desde' no puede ser mayor a 'Hasta'");
        return;
      }
      
      renderizarReporte();
    }

    // ===============================
    // 📊 Renderizar reporte actual
    // ===============================
    function renderizarReporte() {
      if (reporteActual === 'por-dia') {
        renderizarReportePorDia();
      } else {
        renderizarReportePorProducto();
      }
    }

    // ===============================
    // 📅 Reporte: Ventas por Cliente/Día
    // ===============================
    function renderizarReportePorDia() {
      const contenedor = document.getElementById('tabla-reportes');
      const fechaDesde = document.getElementById('fecha-desde').value;
      const fechaHasta = document.getElementById('fecha-hasta').value;
      
      // Filtrar por rango de fechas
      let ventasFiltradas = [...todasLasVentas];
      if (fechaDesde) {
        ventasFiltradas = ventasFiltradas.filter(v => v.fecha >= fechaDesde);
      }
      if (fechaHasta) {
        ventasFiltradas = ventasFiltradas.filter(v => v.fecha <= fechaHasta);
      }
      
      // Agrupar por cliente y fecha
      const agrupado = {};
      ventasFiltradas.forEach(venta => {
        const clave = `${venta.clienteId}|${venta.fecha}`;
        if (!agrupado[clave]) {
          agrupado[clave] = {
            clienteId: venta.clienteId,
            clienteNombre: venta.clienteNombre,
            clienteTelefono: venta.clienteTelefono,
            fecha: venta.fecha,
            productos: [],
            cantidadTotal: 0,
            montoTotal: 0,
            pagadoTotal: venta.pagadoTotalFactura,
            saldoTotal: venta.saldoTotalFactura,
            metodoPago: venta.metodoPago,
            compraId: venta.compraId
          };
        }
        agrupado[clave].productos.push({
          nombre: venta.producto,
          cantidad: venta.cantidad,
          subtotal: venta.subtotal,
          precioUnitario: venta.precioUnitario
        });
        agrupado[clave].cantidadTotal += venta.cantidad;
        agrupado[clave].montoTotal += venta.subtotal;
      });
      
      // Convertir a array y ordenar (fecha descendente + cliente)
      const reporte = Object.values(agrupado)
        .sort((a, b) => {
          if (b.fecha !== a.fecha) return b.fecha.localeCompare(a.fecha);
          return a.clienteNombre.localeCompare(b.clienteNombre);
        });
      
      // Renderizar tabla
      let html = `
        <table class="tabla-reporte">
          <thead>
            <tr>
              <th>Fecha</th>
              <th>Cliente</th>
              <th>Teléfono</th>
              <th>Productos (Cantidad)</th>
              <th>Cant. Total</th>
              <th>Monto Total</th>
              <th>Pagado</th>
              <th>Saldo</th>
              <th>Método</th>
              <th>Acciones</th>
            </tr>
          </thead>
          <tbody>
      `;
      
      reporte.forEach((venta, index) => {
        const productosTxt = venta.productos
          .map(p => `${p.nombre} (${p.cantidad})`)
          .join(', ');
        
        const ventaJSON = JSON.stringify(venta).replace(/"/g, '&quot;');
        
        html += `
          <tr>
            <td>${venta.fecha}</td>
            <td>${venta.clienteNombre}</td>
            <td>${venta.clienteTelefono}</td>
            <td class="productos-col">${productosTxt}</td>
            <td class="numero">${venta.cantidadTotal}</td>
            <td class="numero">₡${venta.montoTotal.toLocaleString('es-CR')}</td>
            <td class="numero">₡${venta.pagadoTotal.toLocaleString('es-CR')}</td>
            <td class="numero ${venta.saldoTotal > 0 ? 'saldo-pendiente' : 'saldo-pagado'}">
              ₡${venta.saldoTotal.toLocaleString('es-CR')}
            </td>
            <td>${venta.metodoPago}</td>
            <td class="acciones-fila">
              <button class="btn-pdf" onclick="descargarPDF('${ventaJSON}')" title="Descargar Factura PDF">
                📄 PDF
              </button>
              <button class="btn-whatsapp" onclick="prepararEnvioWhatsApp('${ventaJSON}')" title="Enviar por WhatsApp">
                💬 WhatsApp
              </button>
            </td>
          </tr>
        `;
      });
      
      if (reporte.length === 0) {
        html += `
          <tr>
            <td colspan="10" class="sin-datos">
              No hay ventas en el período seleccionado
            </td>
          </tr>
        `;
      }
      
      html += `
          </tbody>
        </table>
        <div class="acciones-exportar">
          <button onclick="exportarCSV('por-dia')" class="btn-exportar">
            📥 Exportar a CSV
          </button>
          <button onclick="window.print()" class="btn-imprimir">
            🖨️ Imprimir
          </button>
        </div>
      `;
      
      contenedor.innerHTML = html;
    }

    // ===============================
    // 📦 Reporte: Ventas por Producto
    // ===============================
    function renderizarReportePorProducto() {
      const contenedor = document.getElementById('tabla-reportes');
      const fechaDesde = document.getElementById('fecha-desde').value;
      const fechaHasta = document.getElementById('fecha-hasta').value;
      
      // Filtrar por rango de fechas
      let ventasFiltradas = [...todasLasVentas];
      if (fechaDesde) {
        ventasFiltradas = ventasFiltradas.filter(v => v.fecha >= fechaDesde);
      }
      if (fechaHasta) {
        ventasFiltradas = ventasFiltradas.filter(v => v.fecha <= fechaHasta);
      }
      
      // Agrupar por producto
      const agrupado = {};
      ventasFiltradas.forEach(venta => {
        if (!agrupado[venta.producto]) {
          agrupado[venta.producto] = {
            nombre: venta.producto,
            clientes: [],
            cantidadTotal: 0,
            montoTotal: 0
          };
        }
        
        // Buscar si ya existe el cliente en este producto
        const clienteExistente = agrupado[venta.producto].clientes.find(
          c => c.clienteId === venta.clienteId && c.fecha === venta.fecha
        );
        
        if (clienteExistente) {
          clienteExistente.cantidad += venta.cantidad;
          clienteExistente.subtotal += venta.subtotal;
        } else {
          agrupado[venta.producto].clientes.push({
            clienteId: venta.clienteId,
            clienteNombre: venta.clienteNombre,
            clienteTelefono: venta.clienteTelefono,
            fecha: venta.fecha,
            cantidad: venta.cantidad,
            subtotal: venta.subtotal
          });
        }
        
        agrupado[venta.producto].cantidadTotal += venta.cantidad;
        agrupado[venta.producto].montoTotal += venta.subtotal;
      });
      
      // Convertir a array y ordenar (monto descendente)
      const reporte = Object.values(agrupado)
        .sort((a, b) => b.montoTotal - a.montoTotal);
      
      // Renderizar tabla
      let html = `
        <table class="tabla-reporte">
          <thead>
            <tr>
              <th>Producto</th>
              <th>Clientes</th>
              <th>Cant. Total</th>
              <th>Monto Total</th>
            </tr>
          </thead>
          <tbody>
      `;
      
      reporte.forEach(producto => {
        const detalleClientes = producto.clientes
          .map(c => `${c.clienteNombre} (${c.cantidad})`)
          .join(', ');
        
        html += `
          <tr>
            <td><strong>${producto.nombre}</strong></td>
            <td class="detalle-clientes">${detalleClientes}</td>
            <td class="numero">${producto.cantidadTotal}</td>
            <td class="numero">₡${producto.montoTotal.toLocaleString('es-CR')}</td>
          </tr>
        `;
      });
      
      if (reporte.length === 0) {
        html += `
          <tr>
            <td colspan="4" class="sin-datos">
              No hay ventas en el período seleccionado
            </td>
          </tr>
        `;
      }
      
      html += `
          </tbody>
        </table>
        <div class="acciones-exportar">
          <button onclick="exportarCSV('por-producto')" class="btn-exportar">
            📥 Exportar a CSV
          </button>
          <button onclick="window.print()" class="btn-imprimir">
            🖨️ Imprimir
          </button>
        </div>
      `;
      
      contenedor.innerHTML = html;
    }

    // ===============================
    // 📊 Actualizar resumen
    // ===============================
    function actualizarResumen() {
      const fechaDesde = document.getElementById('fecha-desde').value;
      const fechaHasta = document.getElementById('fecha-hasta').value;
      
      let ventasFiltradas = [...todasLasVentas];
      if (fechaDesde) {
        ventasFiltradas = ventasFiltradas.filter(v => v.fecha >= fechaDesde);
      }
      if (fechaHasta) {
        ventasFiltradas = ventasFiltradas.filter(v => v.fecha <= fechaHasta);
      }
      
      const totalVentas = ventasFiltradas.reduce((sum, v) => sum + v.subtotal, 0);
      const totalPagado = ventasFiltradas.reduce((sum, v) => sum + v.pagadoTotalFactura, 0);
      const totalSaldo = ventasFiltradas.reduce((sum, v) => sum + v.saldoTotalFactura, 0);
      const cantidadTransacciones = new Set(ventasFiltradas.map(v => `${v.clienteId}|${v.fecha}`)).size;
      
      const html = `
        <div class="resumen-item">
          <span class="etiqueta">💰 Total Ventas</span>
          <span class="valor">₡${totalVentas.toLocaleString('es-CR')}</span>
        </div>
        <div class="resumen-item">
          <span class="etiqueta">✅ Total Pagado</span>
          <span class="valor">₡${totalPagado.toLocaleString('es-CR')}</span>
        </div>
        <div class="resumen-item">
          <span class="etiqueta">⏳ Saldo Pendiente</span>
          <span class="valor">₡${totalSaldo.toLocaleString('es-CR')}</span>
        </div>
        <div class="resumen-item">
          <span class="etiqueta">📋 Transacciones</span>
          <span class="valor">${cantidadTransacciones}</span>
        </div>
      `;
      
      document.getElementById('resumen-ventas').innerHTML = html;
    }

    // ===============================
    // 📥 Exportar a CSV
    // ===============================
    function exportarCSV(tipo) {
      let csv = '';
      
      if (tipo === 'por-dia') {
        csv = 'Fecha,Cliente,Teléfono,Productos,Cantidad Total,Monto Total,Pagado,Saldo,Método Pago\n';
        todasLasVentas.forEach(venta => {
          csv += `"${venta.fecha}","${venta.clienteNombre}","${venta.clienteTelefono}","${venta.producto}",${venta.cantidad},${venta.subtotal},${venta.pagadoTotalFactura},${venta.saldoTotalFactura},"${venta.metodoPago}"\n`;
        });
      } else {
        csv = 'Producto,Clientes,Cantidad Total,Monto Total\n';
        const agrupado = {};
        todasLasVentas.forEach(venta => {
          if (!agrupado[venta.producto]) {
            agrupado[venta.producto] = { cantidad: 0, monto: 0, clientes: new Set() };
          }
          agrupado[venta.producto].cantidad += venta.cantidad;
          agrupado[venta.producto].monto += venta.subtotal;
          agrupado[venta.producto].clientes.add(venta.clienteNombre);
        });
        
        Object.entries(agrupado).forEach(([producto, datos]) => {
          csv += `"${producto}","${Array.from(datos.clientes).join('; ')}",${datos.cantidad},${datos.monto}\n`;
        });
      }
      
      const blob = new Blob([csv], { type: 'text/csv' });
      const url = window.URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.href = url;
      a.download = `reporte-${tipo}-${new Date().toISOString().split('T')[0]}.csv`;
      a.click();
    }

        btnPDF.innerHTML = '⏳ Generando...';

        // Crear elemento HTML para el PDF

            <table style="width: 100%; border-collapse: collapse; margin-bottom: 30px;">
              <thead>
                <tr style="background-color: #8B7500; color: white;">
                  <th style="padding: 12px; text-align: left; border: 1px solid #8B7500; font-weight: bold;">Producto</th>

                  <span>Subtotal:</span>
                  <span style="font-weight: bold;">₡${venta.montoTotal.toLocaleString('es-CR')}</span>
                </div>
                <div style="display: flex; justify-content: space-between; margin-bottom: 12px; font-size: 0.95rem;">
                  <span>Pagado:</span>
                  <span style="font-weight: bold;">₡${venta.pagadoTotal.toLocaleString('es-CR')}</span>

              </div>
            </div>
            
            <div style="margin-top: 40px; padding-top: 20px; border-top: 1px solid #ddd; text-align: center; color: #666; font-size: 0.9rem;">

        // Generar y descargar PDF

    // ===============================
    // 💬 Preparar envío por WhatsApp
    // ===============================
    function prepararEnvioWhatsApp(ventaJSON) {
      try {
        const venta = JSON.parse(ventaJSON);
        
        if (!venta.clienteTelefono) {
          alert("❌ El cliente no tiene número de teléfono registrado");
          return;
        }
        
        // Mostrar modal de confirmación
        mostrarModalEnvioWhatsApp(venta);
        
      } catch (error) {
        console.error("Error preparando envío:", error);
        alert("❌ Error al preparar el envío: " + error.message);
      }
    }

    // ===============================
    // 🔔 Modal de confirmación
    // ===============================
    function mostrarModalEnvioWhatsApp(venta) {
      const modal = document.createElement('div');
      modal.id = 'modal-whatsapp';
      modal.className = 'modal-overlay';
      modal.innerHTML = `
        <div class="modal-contenido">
          <div class="modal-header">
            <h2>📤 Enviar Factura por WhatsApp</h2>
            <button class="btn-cerrar-modal" onclick="cerrarModalWhatsApp()">✕</button>
          </div>
          
          <div class="modal-body">
            <div class="info-cliente">
              <p><strong>👤 Cliente:</strong> ${venta.clienteNombre}</p>
              <p><strong>📱 Teléfono:</strong> ${venta.clienteTelefono}</p>
              <p><strong>🧾 Factura:</strong> ${venta.compraId}</p>
              <p><strong>📅 Fecha:</strong> ${venta.fecha}</p>
            </div>
            
            <div class="resumen-factura">
              <h3>📋 Resumen de la Factura</h3>
              <table class="tabla-modal">
                <tr>
                  <td>Total de la Factura:</td>
                  <td class="valor">₡${venta.montoTotal.toLocaleString('es-CR')}</td>
                </tr>
                <tr>
                  <td>Pagado:</td>

    // ===============================
    // 📥 Descargar PDF desde Modal
    // ===============================
    async function descargarPDFDesdeModal(ventaJSON) {
      try {
        const venta = JSON.parse(ventaJSON);
        
        // Mostrar indicador de carga
        const btnDescargar = event.target.closest('.btn-descargar-modal');
        const textoOriginal = btnDescargar.innerHTML;
        btnDescargar.innerHTML = '⏳ Generando...';
        btnDescargar.disabled = true;
        
        // Crear elemento HTML para el PDF
        const element = document.createElement('div');
        element.innerHTML = `
          <div style="font-family: Arial, sans-serif; padding: 30px; max-width: 800px; margin: 0 auto; background: white;">
            <div style="text-align: center; margin-bottom: 30px; border-bottom: 3px solid #8B7500; padding-bottom: 20px;">
              <h1 style="color: #8B7500; margin: 0; font-size: 2.5rem;">ESENTIA</h1>
              <p style="color: #666; margin: 10px 0 0 0; font-size: 1.2rem; font-weight: bold;">Factura de Venta</p>
            </div>
            
            <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 30px; margin-bottom: 30px;">
              <div>
                <p style="margin: 8px 0; font-size: 0.95rem;"><strong style="color: #8B7500;">CLIENTE:</strong></p>
                <p style="margin: 5px 0; font-size: 1.1rem; font-weight: bold;">${venta.clienteNombre}</p>
                <p style="margin: 5px 0; color: #666;"><strong>Teléfono:</strong> ${venta.clienteTelefono}</p>
              </div>
              <div style="text-align: right;">
                <p style="margin: 8px 0; font-size: 0.95rem;"><strong style="color: #8B7500;">INFORMACIÓN:</strong></p>
                <p style="margin: 5px 0;"><strong>Fecha:</strong> ${venta.fecha}</p>
                <p style="margin: 5px 0;"><strong>Factura #:</strong> ${venta.compraId}</p>
              </div>
            </div>
            
            <table style="width: 100%; border-collapse: collapse; margin-bottom: 30px;">
              <thead>
                <tr style="background-color: #8B7500; color: white;">
                  <th style="padding: 12px; text-align: left; border: 1px solid #8B7500; font-weight: bold;">Producto</th>
                  <th style="padding: 12px; text-align: center; border: 1px solid #8B7500; font-weight: bold;">Cantidad</th>
                  <th style="padding: 12px; text-align: right; border: 1px solid #8B7500; font-weight: bold;">Precio Unit.</th>
                  <th style="padding: 12px; text-align: right; border: 1px solid #8B7500; font-weight: bold;">Subtotal</th>
                </tr>
              </thead>
              <tbody>
                ${venta.productos.map(p => `
                  <tr style="border-bottom: 1px solid #ddd;">
                    <td style="padding: 12px; text-align: left;">${p.nombre}</td>
                    <td style="padding: 12px; text-align: center;">${p.cantidad}</td>
                    <td style="padding: 12px; text-align: right;">₡${p.precioUnitario.toLocaleString('es-CR')}</td>
                    <td style="padding: 12px; text-align: right; font-weight: bold;">₡${p.subtotal.toLocaleString('es-CR')}</td>
                  </tr>
                `).join('')}
              </tbody>
            </table>
            
            <div style="display: grid; grid-template-columns: 1fr 350px; gap: 20px;">
              <div></div>
              <div style="border-top: 3px solid #8B7500; padding-top: 15px;">
                <div style="display: flex; justify-content: space-between; margin-bottom: 12px; font-size: 0.95rem;">
                  <span>Subtotal:</span>
                  <span style="font-weight: bold;">₡${venta.montoTotal.toLocaleString('es-CR')}</span>
                </div>
                <div style="display: flex; justify-content: space-between; margin-bottom: 12px; font-size: 0.95rem;">
                  <span>Pagado:</span>
                  <span style="font-weight: bold;">₡${venta.pagadoTotal.toLocaleString('es-CR')}</span>
                </div>
                <div style="display: flex; justify-content: space-between; padding-top: 12px; border-top: 2px solid #ddd; font-size: 1.1rem;">
                  <strong>Saldo:</strong>
                  <strong style="color: ${venta.saldoTotal > 0 ? '#c62828' : '#2e7d32'};">₡${venta.saldoTotal.toLocaleString('es-CR')}</strong>
                </div>
              </div>
            </div>
            
            <div style="margin-top: 40px; padding-top: 20px; border-top: 1px solid #ddd; text-align: center; color: #666; font-size: 0.9rem;">
              <p style="margin: 5px 0;"><strong>Método de Pago:</strong> ${venta.metodoPago}</p>
              <p style="margin: 10px 0 0 0; font-style: italic;">Gracias por su compra. Esentia</p>
            </div>
          </div>
        `;
        
        // Configurar opciones de html2pdf
        const opt = {
          margin: 10,
          filename: `Factura-${venta.clienteNombre.replace(/\s+/g, '_')}-${venta.fecha}.pdf`,
          image: { type: 'jpeg', quality: 0.98 },
          html2canvas: { scale: 2, useCORS: true },
          jsPDF: { orientation: 'portrait', unit: 'mm', format: 'a4' }
        };
        
        // Generar y descargar PDF
        html2pdf().set(opt).from(element).save();
        
        // Restaurar botón
        setTimeout(() => {
          btnDescargar.innerHTML = textoOriginal;
          btnDescargar.disabled = false;
        }, 1500);
        
      } catch (error) {
        console.error("Error descargando PDF:", error);
        alert("❌ Error al descargar el PDF: " + error.message);
        const btnDescargar = event.target.closest('.btn-descargar-modal');
        btnDescargar.innerHTML = '📥 Descargar PDF';
        btnDescargar.disabled = false;
      }
    }

    // ===============================
    // ❌ Cerrar modal
    // ===============================
    function cerrarModalWhatsApp() {
      const modal = document.getElementById('modal-whatsapp');
      if (modal) {
        modal.remove();
      }
    }

    // ===============================
    // 📤 Enviar factura por WhatsApp
    // ===============================
    function enviarFacturaWhatsApp(telefono, facturaId, nombreCliente) {
      try {
        // Limpiar formato de teléfono (solo números)
        const telefonoLimpio = telefono.replace(/\D/g, '');
        
        // Construir mensaje
        const incluirMensaje = document.getElementById('incluir-mensaje').checked;
        const mensajePersonalizado = document.getElementById('mensaje-personalizado').value;
        
        let mensaje = `Hola ${nombreCliente},\n\n`;
        mensaje += `Te compartimos tu factura #${facturaId}.\n\n`;
        mensaje += `Por favor, revisa el archivo PDF adjunto con los detalles de tu compra.\n\n`;
        
        if (incluirMensaje && mensajePersonalizado) {
          mensaje += `${mensajePersonalizado}\n\n`;
        }
        
        mensaje += `Gracias por tu compra en Esentia.`;
        
        // Crear URL de WhatsApp
        const urlWhatsApp = `https://wa.me/${telefonoLimpio}?text=${encodeURIComponent(mensaje)}`;
        
        // Abrir WhatsApp
        window.open(urlWhatsApp, '_blank');
        
        // Cerrar modal después de abrir WhatsApp
        setTimeout(() => {
          cerrarModalWhatsApp();
        }, 500);
        
      } catch (error) {
        console.error("Error enviando por WhatsApp:", error);
        alert("❌ Error al enviar por WhatsApp: " + error.message);
      }
    }

    // ===============================
    // 🎯 Inicialización
    // ===============================
    document.addEventListener('DOMContentLoaded', () => {
      // Configurar botones de navegación
      document.getElementById('btn-por-dia').addEventListener('click', () => {
        reporteActual = 'por-dia';
        document.querySelectorAll('.btn-reporte').forEach(btn => btn.classList.remove('activo'));
        document.getElementById('btn-por-dia').classList.add('activo');
        renderizarReporte();
      });
      
      document.getElementById('btn-por-producto').addEventListener('click', () => {
        reporteActual = 'por-producto';
        document.querySelectorAll('.btn-reporte').forEach(btn => btn.classList.remove('activo'));
        document.getElementById('btn-por-producto').classList.add('activo');
        renderizarReporte();
      });
      
      document.getElementById('btn-recargar').addEventListener('click', filtrarPorFechas);
      
      // Establecer fechas por defecto (últimos 30 días)
      const hoy = new Date();
      const hace30 = new Date();
      hace30.setDate(hoy.getDate() - 30);
      
      document.getElementById('fecha-desde').valueAsDate = hace30;
      document.getElementById('fecha-hasta').valueAsDate = hoy;
      
      // Cargar datos iniciales
      cargarDatosReporte();
    });

    // Exponer funciones globales
    window.exportarCSV = exportarCSV;
    window.filtrarPorFechas = filtrarPorFechas;
    window.cargarDatosReporte = cargarDatosReporte;
    window.descargarPDF = descargarPDF;
    window.prepararEnvioWhatsApp = prepararEnvioWhatsApp;
    window.cerrarModalWhatsApp = cerrarModalWhatsApp;
    window.enviarFacturaWhatsApp = enviarFacturaWhatsApp;
    window.descargarPDFDesdeModal = descargarPDFDesdeModal;
  </script>
