    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
    <style>
        :root {
            --primary: #1a1a2e;
            --secondary: #16213e;
            --accent: #e94560;
            --accent-light: #ff6b6b;
            --gold: #d4af37;
            --text: #eaeaea;
            --text-muted: #a0a0a0;
            --card-bg: rgba(255,255,255,0.05);
            --card-border: rgba(255,255,255,0.1);
            --hover-bg: rgba(233, 69, 96, 0.15);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: linear-gradient(135deg, var(--primary) 0%, var(--secondary) 100%);
            min-height: 100vh;
            color: var(--text);
            overflow-x: hidden;
        }

        /* Partículas de fondo */
        .particles {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            overflow: hidden;
            z-index: 0;
        }

        .particle {
            position: absolute;
            width: 4px;
            height: 4px;
            background: var(--gold);
            border-radius: 50%;
            opacity: 0.3;
            animation: float 15s infinite;
        }

        @keyframes float {
            0%, 100% { transform: translateY(100vh) rotate(0deg); opacity: 0; }
            10% { opacity: 0.3; }
            90% { opacity: 0.3; }
            100% { transform: translateY(-10vh) rotate(720deg); opacity: 0; }
        }

        /* Header */
        .header {
            position: relative;
            z-index: 10;
            padding: 40px 20px 20px;
            text-align: center;
            background: linear-gradient(180deg, rgba(26,26,46,0.9) 0%, transparent 100%);
        }

        .logo {
            font-size: 3rem;
            font-weight: 700;
            background: linear-gradient(135deg, var(--gold), #f4e4ba, var(--gold));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            letter-spacing: 2px;
            margin-bottom: 10px;
            text-shadow: 0 0 30px rgba(212, 175, 55, 0.3);
        }

        .subtitle {
            color: var(--text-muted);
            font-size: 1.1rem;
            font-weight: 300;
            letter-spacing: 3px;
            text-transform: uppercase;
        }

        /* Buscador */
        .search-container {
            position: relative;
            z-index: 10;
            max-width: 600px;
            margin: 30px auto;
            padding: 0 20px;
        }

        .search-box {
            width: 100%;
            padding: 16px 25px 16px 55px;
            border: 2px solid var(--card-border);
            border-radius: 50px;
            background: var(--card-bg);
            backdrop-filter: blur(10px);
            color: var(--text);
            font-size: 1rem;
            font-family: 'Inter', sans-serif;
            transition: all 0.3s ease;
            outline: none;
        }

        .search-box:focus {
            border-color: var(--accent);
            box-shadow: 0 0 20px rgba(233, 69, 96, 0.2);
        }

        .search-box::placeholder {
            color: var(--text-muted);
        }

        .search-icon {
            position: absolute;
            left: 40px;
            top: 50%;
            transform: translateY(-50%);
            color: var(--text-muted);
            font-size: 1.1rem;
        }

        /* Contador */
        .stats-bar {
            display: flex;
            justify-content: center;
            gap: 40px;
            padding: 20px;
            position: relative;
            z-index: 10;
            flex-wrap: wrap;
        }

        .stat-item {
            text-align: center;
        }

        .stat-number {
            font-size: 2rem;
            font-weight: 700;
            color: var(--gold);
        }

        .stat-label {
            color: var(--text-muted);
            font-size: 0.85rem;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        /* Grid de categorías */
        .container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 20px;
            position: relative;
            z-index: 10;
        }

        .category {
            margin-bottom: 40px;
        }

        .category-header {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 20px;
            padding: 0 10px;
        }

        .category-icon {
            width: 40px;
            height: 40px;
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.2rem;
            background: linear-gradient(135deg, var(--accent), var(--accent-light));
            box-shadow: 0 4px 15px rgba(233, 69, 96, 0.3);
        }

        .category-title {
            font-size: 1.3rem;
            font-weight: 600;
            color: var(--text);
        }

        .category-count {
            background: var(--card-bg);
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 0.8rem;
            color: var(--text-muted);
            border: 1px solid var(--card-border);
        }

        .tools-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 16px;
        }

        .tool-card {
            background: var(--card-bg);
            border: 1px solid var(--card-border);
            border-radius: 16px;
            padding: 24px;
            cursor: pointer;
            transition: all 0.3s ease;
            position: relative;
            overflow: hidden;
            text-decoration: none;
            color: inherit;
            display: block;
        }

        .tool-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 3px;
            background: linear-gradient(90deg, var(--accent), var(--gold));
            transform: scaleX(0);
            transform-origin: left;
            transition: transform 0.3s ease;
        }

        .tool-card:hover {
            transform: translateY(-5px);
            background: var(--hover-bg);
            border-color: rgba(233, 69, 96, 0.3);
            box-shadow: 0 10px 40px rgba(0,0,0,0.3);
        }

        .tool-card:hover::before {
            transform: scaleX(1);
        }

        .tool-icon {
            width: 48px;
            height: 48px;
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.4rem;
            margin-bottom: 16px;
            background: rgba(233, 69, 96, 0.1);
            color: var(--accent);
        }

        .tool-name {
            font-size: 1.05rem;
            font-weight: 600;
            margin-bottom: 6px;
            color: var(--text);
        }

        .tool-desc {
            font-size: 0.85rem;
            color: var(--text-muted);
            line-height: 1.5;
        }

        .tool-badge {
            position: absolute;
            top: 16px;
            right: 16px;
            padding: 4px 10px;
            border-radius: 20px;
            font-size: 0.7rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .badge-new {
            background: rgba(46, 204, 113, 0.2);
            color: #2ecc71;
            border: 1px solid rgba(46, 204, 113, 0.3);
        }

        .badge-recent {
            background: rgba(233, 69, 96, 0.2);
            color: var(--accent-light);
            border: 1px solid rgba(233, 69, 96, 0.3);
        }

        /* Sin resultados */
        .no-results {
            text-align: center;
            padding: 60px 20px;
            color: var(--text-muted);
            display: none;
        }

        .no-results i {
            font-size: 3rem;
            margin-bottom: 16px;
            opacity: 0.5;
        }

        /* Footer */
        .footer {
            text-align: center;
            padding: 40px 20px;
            color: var(--text-muted);
            font-size: 0.85rem;
            position: relative;
            z-index: 10;
        }

        .footer span {
            color: var(--gold);
        }

        /* Scrollbar */
        ::-webkit-scrollbar {
            width: 8px;
        }

        ::-webkit-scrollbar-track {
            background: var(--primary);
        }

        ::-webkit-scrollbar-thumb {
            background: var(--accent);
            border-radius: 4px;
        }

        /* Responsive */
        @media (max-width: 768px) {
            .logo { font-size: 2rem; }
            .tools-grid { grid-template-columns: 1fr; }
            .stats-bar { gap: 20px; }
        }

        /* Animación de entrada */
        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .tool-card {
            animation: fadeInUp 0.5s ease forwards;
            opacity: 0;
        }
    </style>
</head>

        function createParticles() {
            const container = document.getElementById('particles');
            for (let i = 0; i < 30; i++) {
                const particle = document.createElement('div');
                particle.className = 'particle';
                particle.style.left = Math.random() * 100 + '%';
                particle.style.animationDelay = Math.random() * 15 + 's';
                particle.style.animationDuration = (10 + Math.random() * 10) + 's';
                container.appendChild(particle);
            }
        }

        // Renderizar categorías
        function renderCategories(filter = '') {
            const container = document.getElementById('categoriesContainer');
            const noResults = document.getElementById('noResults');
            container.innerHTML = '';

            let hasResults = false;
            let totalTools = 0;
            let totalCategories = 0;
            let recentCount = 0;

            Object.entries(toolsData).forEach(([categoryName, categoryData], catIndex) => {
                const filteredTools = categoryData.tools.filter(tool => {
                    const searchTerm = filter.toLowerCase();
                    return tool.name.toLowerCase().includes(searchTerm) || 
                           tool.desc.toLowerCase().includes(searchTerm) ||
                           categoryName.toLowerCase().includes(searchTerm);
                });

                if (filteredTools.length === 0) return;

                hasResults = true;
                totalCategories++;
                totalTools += filteredTools.length;
                recentCount += filteredTools.filter(t => t.badge).length;

                const categoryDiv = document.createElement('div');
                categoryDiv.className = 'category';
                categoryDiv.style.animationDelay = `${catIndex * 0.1}s`;

                const headerHtml = `
                    <div class="category-header">
                        <div class="category-icon" style="background: linear-gradient(135deg, ${categoryData.color}, ${categoryData.color}88)">
                            <i class="fas ${categoryData.icon}"></i>
                        </div>
                        <div class="category-title">${categoryName}</div>
                        <div class="category-count">${filteredTools.length}</div>
                    </div>
                `;

                const gridHtml = document.createElement('div');
                gridHtml.className = 'tools-grid';

                filteredTools.forEach((tool, index) => {
                    const card = document.createElement('a');
                    card.className = 'tool-card';
                    card.style.animationDelay = `${index * 0.05}s`;

                    const href = tool.isFolder ? `./${tool.name}/` : `./${tool.name}`;
                    card.href = href;

                    const badgeHtml = tool.badge ? 
                        `<span class="tool-badge badge-${tool.badge}">${tool.badge === 'new' ? 'Nuevo' : 'Reciente'}</span>` : '';

                    card.innerHTML = `
                        ${badgeHtml}
                        <div class="tool-icon">
                            <i class="fas ${tool.icon}"></i>
                        </div>
                        <div class="tool-name">${tool.name}</div>
                        <div class="tool-desc">${tool.desc}</div>
                    `;

                    gridHtml.appendChild(card);
                });

                categoryDiv.innerHTML = headerHtml;
                categoryDiv.appendChild(gridHtml);
                container.appendChild(categoryDiv);
            });

            // Actualizar estadísticas
            document.getElementById('totalTools').textContent = totalTools;
            document.getElementById('totalCategories').textContent = totalCategories;
            document.getElementById('recentUpdates').textContent = recentCount;

            noResults.style.display = hasResults ? 'none' : 'flex';
        }

        // Búsqueda
        document.getElementById('searchBox').addEventListener('input', (e) => {
            renderCategories(e.target.value);
        });

        // Inicializar
        createParticles();
        renderCategories();
    </script>
</body>
</html>
